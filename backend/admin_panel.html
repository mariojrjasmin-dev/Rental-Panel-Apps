      <div id="po-total-wrap" style="margin-top:12px;padding:14px;background:#a05a00;color:#fff;border-radius:10px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;font-weight:800;letter-spacing:0.5px;text-transform:uppercase">💰 To collect at drop-off</span>

  root.innerHTML = `
    <div id="po-overlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:60px 20px 20px;overflow-y:auto" onclick="if(event.target===this)closeModal()">

      const hint = document.getElementById('po-extra-fee');
      const brOut = document.getElementById('po-br-out');
      const brIn = document.getElementById('po-br-in');
      const brDriven = document.getElementById('po-br-driven');
      const brExtra = document.getElementById('po-br-extra');
      const brTotal = document.getElementById('po-br-total');
      const totalWrap = document.getElementById('po-total-wrap');
      if (!breakdown || !hint) return;

      if (!oin || !oout) {
        breakdown.style.display = 'none';
        hint.style.display = 'block';
        hint.textContent = 'Enter both odometer values to see the breakdown.';
        hint.style.color = '#666';
        return;
      }
      if (oout < oin) {
        breakdown.style.display = 'none';
        hint.style.display = 'block';
        hint.textContent = '⚠️ Drop-off reading cannot be less than pickup reading.';
        hint.style.color = '#d70015';
        return;
      }
      // Show the breakdown panel
      breakdown.style.display = 'block';
      hint.style.display = 'none';
      const driven = oout - oin;
      const overage = Math.max(0, driven - (allowedKm || 0));
      const fee = overage * (mileagePolicy.extra_mileage_charge || 0);
      brOut.textContent = oout.toLocaleString() + ' km';
      brIn.textContent = oin.toLocaleString() + ' km';
      brDriven.textContent = driven.toLocaleString() + ' km';
      brExtra.textContent = overage.toLocaleString() + ' km';
      brTotal.textContent = '$' + fee.toFixed(2);
      // Green/Orange total bar depending on overage
      if (overage <= 0) {
        totalWrap.style.background = '#34c759';
        brTotal.parentElement.firstElementChild.textContent = '✅ Within limit — no extra charge';
      } else {
        totalWrap.style.background = '#a05a00';
        brTotal.parentElement.firstElementChild.textContent = '💰 To collect at drop-off';
      }
    };
  }
}

async function submitOp(bookingId, newStatus, action, policy, days) {
  const msg = document.getElementById('po-msg');
  if (msg) msg.textContent = '';
  const payload = { status: newStatus };

  if (action === 'pickup') {
    const cash = document.getElementById('po-pm-cash');
    const card = document.getElementById('po-pm-card');
    if (cash && cash.checked) payload.payment_method = 'cash';
    else if (card && card.checked) payload.payment_method = 'card';
    else { if (msg) msg.textContent = 'Please select a payment method.'; return; }
    // For pickup with CASH we also auto-set payment_status=paid (admin collects cash now).
    if (payload.payment_method === 'cash') payload.payment_status = 'paid';
    const odomEl = document.getElementById('po-odom-in');
    const odom = odomEl && odomEl.value ? parseInt(odomEl.value, 10) : null;
    if (odom !== null && !isNaN(odom)) payload.odometer_in = odom;
  } else {
    // Drop-off
    const oinEl = document.getElementById('po-odom-in');
    const ooutEl = document.getElementById('po-odom-out');
    const oin = oinEl && oinEl.value !== '' ? parseInt(oinEl.value, 10) : null;
    const oout = ooutEl && ooutEl.value !== '' ? parseInt(ooutEl.value, 10) : null;
    if (oin !== null && !isNaN(oin)) payload.odometer_in = oin;
    if (oout !== null && !isNaN(oout)) {
      if (oin !== null && oout < oin) { if (msg) msg.textContent = 'Drop-off reading cannot be less than pickup reading.'; return; }
      payload.odometer_out = oout;
    }
  }

  try {
    await api('/admin/bookings/'+bookingId+'/status', { method:'PUT', body: JSON.stringify(payload) });
    closeModal();
    showOperations();
  } catch (e) {
    if (msg) msg.textContent = e.message || 'Failed to update booking.';
    else alert(e.message);
  }
}

}

async function doChangePassword() {
  const oldP = document.getElementById('cp-old').value;
  const newP = document.getElementById('cp-new').value;
  const newP2 = document.getElementById('cp-new2').value;
  const msg = document.getElementById('cp-msg');
  msg.style.color = '#d70015';
  if (!oldP || !newP || !newP2) { msg.textContent = '⚠️ Please fill out all fields.'; return; }
  if (newP !== newP2) { msg.textContent = '⚠️ The two new passwords do not match.'; return; }
  if (newP.length < 8) { msg.textContent = '⚠️ Minimum 8 characters for the new password.'; return; }
  msg.style.color = '#666';
  msg.textContent = 'Updating…';
  try {
    await api('/auth/change-password', {
      method: 'POST',
      body: JSON.stringify({ current_password: oldP, new_password: newP })
    });
    msg.style.color = '#0a5d2b';
    msg.textContent = '✅ Password updated. You will stay logged in for this session.';
    setTimeout(() => closeModal(), 1600);
  } catch (e) {
    msg.style.color = '#d70015';
    msg.textContent = '❌ ' + (e.message || 'Could not update password.');
  }
}

async function showPaymentReminders() {

  const now = Date.now();
  function ageDays(b) {

  render(`
    <div class="header">
      <div><img class="brand-logo" src="/api/assets/logo.png" alt="DAMS Rent a Car"/></div>
      <div style="display:flex;gap:8px">

          <div class="form-group" style="margin-bottom:0">

          <button class="btn btn-blue" onclick="runPaymentRemindersNow()">▶︎ Run now</button>
        </div>
        <div id="pr-msg" style="margin-top:10px;font-size:13px;font-weight:700"></div>
      </div>
      <div style="background:#fff;border:1px solid #eee;border-radius:14px;padding:18px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">

          <span style="background:#ff9500;color:#fff;padding:2px 10px;border-radius:8px;font-size:11px;font-weight:800">${bookings.length} total</span>
        </div>
        ${bookings.length ? '<table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="background:#fafafa"><th style="text-align:left;padding:8px;font-weight:700">Booking</th><th style="text-align:left;padding:8px;font-weight:700">Customer</th><th style="text-align:left;padding:8px;font-weight:700">Car</th><th style="text-align:left;padding:8px;font-weight:700">Age</th><th style="text-align:left;padding:8px;font-weight:700">Last reminder</th></tr></thead><tbody>'
          + bookings.map(b => '<tr style="border-top:1px solid #eee"><td style="padding:8px">#'+ (b.id||'').slice(-8).toUpperCase() +'</td><td style="padding:8px">'+(b.user_email||'')+'</td><td style="padding:8px">'+(b.car_name||'')+'</td><td style="padding:8px">'+ageDays(b)+' day(s)</td><td style="padding:8px">'+(b.last_payment_reminder_at? new Date(b.last_payment_reminder_at).toLocaleString() : '—')+'</td></tr>').join('')

  try {

    msg.style.color = '#0a5d2b';
    msg.textContent = '✅ Saved. ' + (r.note || '');
  } catch (e) {
    msg.style.color = '#d70015';
    msg.textContent = '❌ ' + (e.message || 'Could not save.');
  }

async function runPaymentRemindersNow() {

}

async function adminResetCustomerPassword(customerId, email, name) {
  const label = (name && name.trim()) ? (name + ' (' + email + ')') : email;
  const pwd = prompt(
    '🔑 Reset password for ' + label + '\n\n' +
    'Type the NEW password (minimum 8 characters).\n' +
    'After clicking OK the customer\'s password is replaced immediately. ' +
    'Share the new password with them securely.'
  );
  if (pwd === null) return;          // cancelled
  const trimmed = (pwd || '').trim();
  if (trimmed.length < 8) {
    alert('⚠️ Password must be at least 8 characters. Nothing was changed.');
    return;
  }
  const pwd2 = prompt('Re-enter the new password to confirm:');
  if (pwd2 === null) return;
  if (pwd2.trim() !== trimmed) {
    alert('⚠️ Passwords do not match. Nothing was changed.');
    return;
  }
  try {
    const res = await api('/admin/customers/' + customerId + '/reset-password', {
      method: 'POST',
      body: JSON.stringify({ new_password: trimmed })
    });
    alert('✅ Password updated for ' + (res.email || email) + '.\n\nMake sure to share the new password with the customer through a secure channel.');
    // Refresh the customer detail modal so timestamps update.
    closeModal();
    viewCustomer(customerId);
  } catch (e) {
    alert('❌ ' + (e.message || 'Could not reset the password.'));
  }
}

    const bookings = await api('/admin/bookings' + (params.toString() ? '?' + params : ''));
    const statuses = [
      {k:'all', label:'All', color:'#666'},
      {k:'pending_payment', label:'Pending Pay', color:'#ff9500'},
      {k:'confirmed', label:'Confirmed', color:'#007aff'},
      {k:'active', label:'Active', color:'#34c759'},
      {k:'completed', label:'Completed', color:'#5856d6'},
      {k:'cancelled', label:'Cancelled', color:'#ff3b30'}
    ];
    render(`
      <div class="page-title">
        <div>
          <h2>Bookings (${bookings.length})</h2>

      <div id="modal-root"></div>
    `);
  } catch(e) { alert('Failed: '+e.message); }

function bookingCard(b) {
  const statusPills = {
    pending_payment: 'pill-amber', pending: 'pill-amber',
    confirmed: 'pill-blue', active: 'pill-green',
    completed: 'pill-purple', cancelled: 'pill-red'
  };
  const payPills = {
    paid: 'pill-green', succeeded: 'pill-green', cash_paid: 'pill-green',
    pending: 'pill-amber', unpaid: 'pill-amber',
    refunded: 'pill-gray', failed: 'pill-red'
  };
  const payLabels = {
    paid: 'PAID', succeeded: 'PAID', cash_paid: 'PAID',
    pending: 'UNPAID', unpaid: 'UNPAID',
    refunded: 'REFUNDED', failed: 'FAILED'
  };
  const statusClass = statusPills[b.status] || 'pill-gray';
  const statusLabel = (b.status || '').replace(/_/g, ' ').toUpperCase();
  const payClass = payPills[b.payment_status] || 'pill-gray';
  const payLab = payLabels[b.payment_status] || (b.payment_method === 'cash' ? 'CASH PENDING' : 'UNKNOWN');
  const pickup = (b.pickup_date || '').substring(0, 10);
  const dropoff = (b.dropoff_date || '').substring(0, 10);
  const created = b.created_at ? new Date(b.created_at).toLocaleDateString() : '';
  const country = ((b.pickup_location || {}).country || '').toLowerCase();
  const taxLab = (country.indexOf('dominican') !== -1 || country === 'rd' || country === 'do') ? 'ITBIS' : 'Tax';
  return `<div class="list-card">
    <div class="lc-head">
      <img class="lc-img" src="${b.car_image || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22/>'}" alt="">
      <div class="col" style="flex:1">
        <h3 class="lc-title">${b.car_name || 'Car'}</h3>
        <p class="lc-sub">${b.user_name || 'Customer'} · ${b.user_email || ''}</p>
        <p class="lc-hint">${pickup} → ${dropoff} · ${b.days || 0} days · ${created}</p>
      </div>
      <div class="col" style="align-items:flex-end;gap:4px;flex:0 0 auto">
        <span class="pill ${statusClass}">${statusLabel}</span>
        <span class="pill ${payClass}">💳 ${payLab}</span>
      </div>
    </div>
    <div class="lc-foot">
      <div style="flex:1;min-width:200px;font-size:12.5px" class="t-muted t-mono">
        Subtotal <strong class="t-strong">$${(b.subtotal || 0).toFixed(2)}</strong>
        · ${taxLab} ${b.tax_rate || 0}% <strong class="t-strong">$${(b.tax_amount || 0).toFixed(2)}</strong>
        · <span class="t-total">Total $${(b.total_price || 0).toFixed(2)}</span>
        · ${(b.payment_method || 'cash').toUpperCase()}
      </div>
      <div class="lc-actions">
        <button class="btn btn-sm btn-blue" onclick="downloadReceipt('${b.id}')">📄 Receipt</button>
        ${(b.payment_status !== 'paid' && (b.payment_method || 'cash') === 'cash') ? `<button class="btn btn-sm" style="background:var(--success);color:#fff;border-color:var(--success)" onclick="markCashPaid('${b.id}')">💰 Mark Cash Paid</button>` : ''}
        <select class="select-inline" onchange="updateBookingStatus('${b.id}', this.value)">
          <option value="">Change status…</option>
          <option value="pending_payment">Pending Payment</option>
          <option value="confirmed">Confirmed</option>
          <option value="active">Active</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
    </div>
  </div>`;
}

async function updateBookingStatus(id, status) {
  if (!status) return;
  if (!confirm('Change booking status to "' + status.replace(/_/g,' ') + '"?')) return;
  try {
    await api('/admin/bookings/'+id+'/status', {method:'PUT', body: JSON.stringify({status})});
    showBookings();
  } catch(e) { alert('Failed: '+e.message); }
}

async function markCashPaid(id) {
  if (!confirm('Mark this cash booking as PAID and CONFIRMED?\n\nUse this once you have collected the cash from the customer.')) return;
  try {
    await api('/admin/bookings/'+id+'/status', {method:'PUT', body: JSON.stringify({status:'confirmed', payment_status:'paid'})});
    showBookings();
  } catch(e) { alert('Failed: '+e.message); }
}

async function downloadReceipt(id) {
  try {
    const res = await fetch(API + '/bookings/' + id + '/receipt.pdf', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!res.ok) throw new Error('Could not fetch receipt');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  } catch(e) { alert('Failed to open receipt: ' + e.message); }
}

        </div>
        <button class="btn btn-red" onclick="doRestore()" id="restore-btn">🔄 Restore database</button>
        <div id="restore-msg" style="font-size:12px;margin-top:10px;font-weight:700"></div>
      </div>
    </div>
  `);
}

async function downloadBackup(format) {
  const msg = document.getElementById('backup-msg');
  if (msg) { msg.style.color = '#666'; msg.textContent = 'Generating backup…'; }
  try {
    const url = `${API}/admin/db-backup?format=${encodeURIComponent(format)}`;
    const r = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
    if (!r.ok) {
      const err = await r.text();
      throw new Error(err || ('HTTP ' + r.status));
    }
    const blob = await r.blob();
    const dlUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    a.href = dlUrl;
    a.download = `dams-db-backup-${ts}.${format}`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(dlUrl);
    if (msg) { msg.style.color = '#0a5d2b'; msg.textContent = `✅ Backup downloaded (${(blob.size/1024).toFixed(1)} KB).`; }
  } catch (e) {
    if (msg) { msg.style.color = '#d70015'; msg.textContent = '❌ ' + (e.message || 'Backup failed'); }
  }
}

async function doRestore() {
  const fileEl = document.getElementById('restore-file');
  const wipeEl = document.getElementById('restore-wipe');
  const msg = document.getElementById('restore-msg');
  const btn = document.getElementById('restore-btn');
  if (!fileEl || !fileEl.files || !fileEl.files[0]) {
    if (msg) { msg.style.color = '#d70015'; msg.textContent = 'Please choose a backup file first.'; }
    return;
  }
  const file = fileEl.files[0];
  const wipe = !!(wipeEl && wipeEl.checked);
  const confirmText = `Restore database from "${file.name}"?\n\n` +
    (wipe ? '⚠️ WIPE FIRST is ENABLED — current data will be DELETED before the restore.\n\n' : 'Documents will be merged by _id.\n\n') +
    'Continue?';
  if (!confirm(confirmText)) return;

  if (msg) { msg.style.color = '#666'; msg.textContent = 'Restoring database… do not close this tab.'; }
  if (btn) btn.disabled = true;

  try {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('wipe_first', wipe ? 'true' : 'false');
    const r = await fetch(`${API}/admin/db-restore`, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token },
      body: fd,
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || 'Restore failed');
    let html = '✅ ' + (data.message || 'Restore complete.') + '<br/><br/><strong>Per-collection summary:</strong><br/>';
    for (const [col, info] of Object.entries(data.summary || {})) {
      if (info.error) {
        html += `&nbsp;&nbsp;❌ <strong>${col}</strong>: ${info.error}<br/>`;
      } else {
        html += `&nbsp;&nbsp;✓ <strong>${col}</strong>: ${info.total || 0} document(s) processed (inserted ${info.inserted || 0}, updated ${info.updated || 0})<br/>`;
      }
    }
    if (msg) { msg.style.color = '#0a5d2b'; msg.innerHTML = html; }
  } catch (e) {
    if (msg) { msg.style.color = '#d70015'; msg.textContent = '❌ ' + (e.message || 'Restore failed'); }
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function exportData() {
  try {
    const data = await api('/admin/export');
    const json = JSON.stringify(data);
    await navigator.clipboard.writeText(json);
    document.getElementById('export-result').innerHTML = '<div style="color:#34c759;font-weight:700;font-size:14px">✅ Copied! ' + data.count.cars + ' cars and ' + data.count.locations + ' locations exported to clipboard.</div>';
  } catch(e) {
    // Fallback: show in textarea for manual copy
    try {
      const data = await api('/admin/export');
      const json = JSON.stringify(data);
      document.getElementById('export-result').innerHTML = '<p style="color:#666;font-size:12px;margin-bottom:4px">Clipboard not available. Copy the text below manually:</p><textarea class="input" rows="4" onclick="this.select()">' + json.replace(/</g,'&lt;') + '</textarea>';
    } catch(e2) { document.getElementById('export-result').innerHTML = '<div style="color:#ff3b30">Error: '+e2.message+'</div>'; }
  }
}

async function importData() {
  const raw = document.getElementById('import-data').value.trim();
  if (!raw) { alert('Please paste the exported data first'); return; }
  try {
    const data = JSON.parse(raw);
    if (!data.cars && !data.locations) { alert('Invalid data format'); return; }
    const result = await api('/admin/import', {method:'POST', body: JSON.stringify(data)});
    document.getElementById('import-result').innerHTML = '<div style="color:#34c759;font-weight:700;font-size:14px">✅ ' + result.message + '</div>';
  } catch(e) {
    document.getElementById('import-result').innerHTML = '<div style="color:#ff3b30">Error: '+e.message+'</div>';
  }
}
