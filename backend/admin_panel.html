<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dams Car Rental - Admin</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#0a0a0a}
.header{background:#0a0a0a;color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px;font-weight:900;letter-spacing:-0.5px}
.header span{color:#ff3b30;font-size:12px;font-weight:700;letter-spacing:4px}
.btn{padding:10px 20px;border:none;border-radius:50px;cursor:pointer;font-weight:700;font-size:14px}
.btn-red{background:#ff3b30;color:#fff}
.btn-gray{background:#e5e5e5;color:#666}
.btn-blue{background:#007aff;color:#fff}
.btn-sm{padding:6px 14px;font-size:12px}
.container{max-width:900px;margin:0 auto;padding:24px}
.login-box{max-width:400px;margin:100px auto;background:#fff;border-radius:24px;padding:40px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.login-box h2{font-size:28px;font-weight:900;margin-bottom:8px}
.login-box p{color:#666;margin-bottom:24px}
.input{width:100%;padding:14px;border:1px solid #e5e5e5;border-radius:12px;font-size:15px;background:#f5f5f5;margin-bottom:12px}
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab{padding:8px 16px;border-radius:50px;border:1px solid #e5e5e5;background:#fff;cursor:pointer;font-weight:600;font-size:13px}
.tab.active{background:#0a0a0a;color:#fff;border-color:#0a0a0a}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #e5e5e5;display:flex;align-items:center;gap:14px}
.card img{width:80px;height:56px;border-radius:10px;object-fit:cover;background:#f5f5f5}
.card-info{flex:1}
.card-info h3{font-size:15px;font-weight:700}
.card-info p{font-size:12px;color:#666;margin-top:2px}
.card-actions{display:flex;gap:6px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.stat{background:#fff;border-radius:14px;padding:16px;text-align:center;border:1px solid #e5e5e5}
.stat .num{font-size:24px;font-weight:900}
.stat .label{font-size:11px;color:#999;text-transform:uppercase;margin-top:4px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.form-row{display:flex;gap:12px}
.form-row .form-group{flex:1}
.loc-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.loc-pill{padding:6px 12px;border-radius:50px;border:1px solid #d5f5e3;background:#f0fff4;cursor:pointer;font-size:11px;font-weight:600}
.loc-pill.active-green{background:#34c759;color:#fff;border-color:#34c759}
.loc-pill.active-red{background:#ff3b30;color:#fff;border-color:#ff3b30}
.selected-loc{background:#f5f5f5;border-radius:10px;padding:8px 12px;margin-bottom:6px;font-size:13px;display:flex;align-items:center;gap:8px}
.selected-loc .dot{width:10px;height:10px;border-radius:5px}
.selected-loc .clear{cursor:pointer;color:#999;margin-left:auto}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:flex;justify-content:center;align-items:flex-start;padding-top:60px;z-index:100}
.modal{background:#fff;border-radius:24px;width:90%;max-width:600px;max-height:80vh;overflow-y:auto;padding:28px}
.modal h2{font-size:20px;font-weight:800;margin-bottom:20px}
.hidden{display:none}
.error{color:#ff3b30;font-size:13px;margin-bottom:12px;background:#fff0f0;padding:10px;border-radius:10px}
.section-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin:20px 0 8px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const API = window.location.origin + '/api';
let token = localStorage.getItem('admin_token');
let locations = [];

async function api(path, opts = {}) {
  const headers = {'Content-Type':'application/json', ...(opts.headers||{})};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API + path, {...opts, headers});
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail || 'Request failed'); }
  return res.json();
}

function render(html) { document.getElementById('app').innerHTML = html; }

// LOGIN
function showLogin(err='') {
  render(`
    <div class="login-box">
      <h1 style="font-size:40px;font-weight:900">DAMS</h1>
      <span style="color:#ff3b30;font-weight:700;letter-spacing:4px;font-size:14px">CAR RENTAL</span>
      <p style="margin-top:12px">Admin Panel Login</p>
      ${err ? '<div class="error">'+err+'</div>' : ''}
      <input class="input" id="email" placeholder="Email" value="admin@damscarrental.com">
      <input class="input" id="pass" type="password" placeholder="Password">
      <button class="btn btn-red" style="width:100%;padding:16px" onclick="doLogin()">Sign In</button>
    </div>
  `);
}

async function doLogin() {
  try {
    const r = await api('/auth/login', {method:'POST', body: JSON.stringify({email:document.getElementById('email').value, password:document.getElementById('pass').value})});
    if (r.role !== 'admin') throw new Error('Admin access required');
    token = r.token; localStorage.setItem('admin_token', token);
    showDashboard();
  } catch(e) { showLogin(e.message); }
}

// DASHBOARD
async function showDashboard() {
  try {
    const [stats, cars, locs] = await Promise.all([api('/admin/stats'), api('/cars/all'), api('/locations')]);
    locations = locs;
    render(`
      <div class="header">
        <div><h1>DAMS <span>CAR RENTAL</span></h1></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-sm btn-gray" onclick="showBookings()">Bookings</button>
          <button class="btn btn-sm btn-gray" onclick="showLocations()">Locations</button>
          <button class="btn btn-sm" style="background:#5856d6;color:#fff" onclick="showAnalytics()">📊 Analytics</button>
          <button class="btn btn-sm" style="background:#ff9500;color:#fff" onclick="showNotifications()">📣 Notify</button>
          <button class="btn btn-sm btn-blue" onclick="showMigration()">Import/Export</button>
          <button class="btn btn-sm btn-gray" onclick="doLogout()">Logout</button>
        </div>
      </div>
      <div class="container">
        <div class="stats">
          <div class="stat"><div class="num">${stats.total_cars}</div><div class="label">Cars</div></div>
          <div class="stat"><div class="num">${stats.total_bookings}</div><div class="label">Bookings</div></div>
          <div class="stat"><div class="num">${stats.total_users}</div><div class="label">Users</div></div>
          <div class="stat"><div class="num">${stats.active_bookings}</div><div class="label">Active</div></div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <h2 style="font-size:20px;font-weight:800">Vehicles</h2>
          <button class="btn btn-red btn-sm" onclick="showCarForm()">+ Add Car</button>
        </div>
        <div id="car-list">${cars.map(c => carCard(c)).join('')}</div>
      </div>
      <div id="modal-root"></div>
    `);
  } catch(e) { 
    // Clear stale token and show actual error
    token=null; localStorage.removeItem('admin_token'); 
    showLogin(e.message || 'Session expired. Please login again.'); 
  }
}

// ==================== ANALYTICS ====================
async function showAnalytics() {
  try {
    const data = await api('/admin/analytics');
    const k = data.kpis || {};
    const fmt = n => '$' + (Number(n)||0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    const monthLabels = (data.monthly_revenue||[]).map(r => {
      const [y,m] = r.month.split('-');
      const dt = new Date(Number(y), Number(m)-1, 1);
      return dt.toLocaleString('en-US', {month:'short', year:'2-digit'});
    });
    const monthRevenue = (data.monthly_revenue||[]).map(r => Number(r.revenue)||0);
    const monthCounts = (data.monthly_revenue||[]).map(r => Number(r.count)||0);

    const statusColors = {
      pending_payment:'#ff9500', pending:'#ff9500',
      confirmed:'#007aff', active:'#34c759',
      completed:'#5856d6', cancelled:'#ff3b30', unknown:'#8e8e93'
    };
    const sb = data.status_breakdown || {};
    const statusKeys = Object.keys(sb);
    const statusVals = statusKeys.map(k=>sb[k]);
    const statusBg = statusKeys.map(k=>statusColors[k]||'#999');

    render(`
      <div class="header">
        <div><h1>DAMS <span>CAR RENTAL</span></h1></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-sm btn-gray" onclick="showDashboard()">← Cars</button>
          <button class="btn btn-sm btn-gray" onclick="showBookings()">Bookings</button>
          <button class="btn btn-sm btn-gray" onclick="doLogout()">Logout</button>
        </div>
      </div>
      <div class="container" style="max-width:1100px">
        <h2 style="font-size:24px;font-weight:900;margin-bottom:18px">📊 Fleet Analytics</h2>

        <!-- KPI Cards -->
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px">
          <div class="kpi" style="background:#fff;border-radius:16px;padding:18px;border:1px solid #e5e5e5">
            <div style="font-size:12px;color:#666;text-transform:uppercase;letter-spacing:1px;font-weight:700">Total Revenue</div>
            <div style="font-size:26px;font-weight:900;color:#34c759;margin-top:4px">${fmt(k.total_revenue)}</div>
            <div style="font-size:11px;color:#999;margin-top:2px">Paid bookings only</div>
          </div>
          <div class="kpi" style="background:#fff;border-radius:16px;padding:18px;border:1px solid #e5e5e5">
            <div style="font-size:12px;color:#666;text-transform:uppercase;letter-spacing:1px;font-weight:700">This Month</div>
            <div style="font-size:26px;font-weight:900;color:#007aff;margin-top:4px">${fmt(k.revenue_this_month)}</div>
            <div style="font-size:11px;color:#999;margin-top:2px">Collected this month</div>
          </div>
          <div class="kpi" style="background:#fff;border-radius:16px;padding:18px;border:1px solid #e5e5e5">
            <div style="font-size:12px;color:#666;text-transform:uppercase;letter-spacing:1px;font-weight:700">Total Bookings</div>
            <div style="font-size:26px;font-weight:900;color:#0a0a0a;margin-top:4px">${k.total_bookings||0}</div>
            <div style="font-size:11px;color:#999;margin-top:2px">${k.paid_bookings||0} paid</div>
          </div>
          <div class="kpi" style="background:#fff;border-radius:16px;padding:18px;border:1px solid #e5e5e5">
            <div style="font-size:12px;color:#666;text-transform:uppercase;letter-spacing:1px;font-weight:700">Active Now</div>
            <div style="font-size:26px;font-weight:900;color:#ff9500;margin-top:4px">${k.active_bookings||0}</div>
            <div style="font-size:11px;color:#999;margin-top:2px">Confirmed + active</div>
          </div>
          <div class="kpi" style="background:#fff;border-radius:16px;padding:18px;border:1px solid #e5e5e5">
            <div style="font-size:12px;color:#666;text-transform:uppercase;letter-spacing:1px;font-weight:700">Avg / Booking</div>
            <div style="font-size:26px;font-weight:900;color:#5856d6;margin-top:4px">${fmt(k.avg_revenue_per_booking)}</div>
            <div style="font-size:11px;color:#999;margin-top:2px">Per paid booking</div>
          </div>
        </div>

        <!-- Charts Row 1: Monthly Revenue + Status Breakdown -->
        <div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px">
          <div style="background:#fff;border-radius:16px;padding:18px;border:1px solid #e5e5e5">
            <h3 style="font-size:15px;font-weight:800;margin-bottom:12px">Revenue · last 6 months</h3>
            <canvas id="chart-revenue" height="120"></canvas>
          </div>
          <div style="background:#fff;border-radius:16px;padding:18px;border:1px solid #e5e5e5">
            <h3 style="font-size:15px;font-weight:800;margin-bottom:12px">Bookings by status</h3>
            <canvas id="chart-status" height="200"></canvas>
          </div>
        </div>

        <!-- Charts Row 2: Booking Trend -->
        <div style="background:#fff;border-radius:16px;padding:18px;border:1px solid #e5e5e5;margin-bottom:16px">
          <h3 style="font-size:15px;font-weight:800;margin-bottom:12px">Bookings trend · last 6 months</h3>
          <canvas id="chart-trend" height="80"></canvas>
        </div>

        <!-- Top Cars + Top Locations -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">
          <div style="background:#fff;border-radius:16px;padding:18px;border:1px solid #e5e5e5">
            <h3 style="font-size:15px;font-weight:800;margin-bottom:12px">🏆 Top 10 Cars</h3>
            ${(data.top_cars||[]).length === 0 ? '<p style="color:#999;font-size:13px">No bookings yet.</p>' : (data.top_cars||[]).map((c,i)=>`
              <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0">
                <div style="display:flex;align-items:center;gap:10px;min-width:0;flex:1">
                  <span style="background:#ff3b30;color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0">${i+1}</span>
                  <span style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${(c.car_name||'Unknown').trim()}</span>
                </div>
                <div style="text-align:right;flex-shrink:0;margin-left:8px">
                  <div style="font-size:13px;font-weight:700">${c.count} bookings</div>
                  <div style="font-size:11px;color:#34c759;font-weight:600">${fmt(c.revenue)}</div>
                </div>
              </div>`).join('')}
          </div>
          <div style="background:#fff;border-radius:16px;padding:18px;border:1px solid #e5e5e5">
            <h3 style="font-size:15px;font-weight:800;margin-bottom:12px">📍 Top Pickup Locations</h3>
            ${(data.top_locations||[]).length === 0 ? '<p style="color:#999;font-size:13px">No bookings yet.</p>' : (data.top_locations||[]).map((l,i)=>`
              <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0">
                <div style="display:flex;align-items:center;gap:10px;min-width:0;flex:1">
                  <span style="background:#007aff;color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0">${i+1}</span>
                  <span style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l.name}</span>
                </div>
                <div style="font-size:13px;font-weight:700;flex-shrink:0;margin-left:8px">${l.count} bookings</div>
              </div>`).join('')}
          </div>
        </div>
      </div>
    `);

    // Build charts after render (Chart.js available globally)
    // Revenue bar chart
    new Chart(document.getElementById('chart-revenue').getContext('2d'), {
      type: 'bar',
      data: {
        labels: monthLabels,
        datasets: [{ label: 'Revenue ($)', data: monthRevenue, backgroundColor: '#34c759', borderRadius: 6 }]
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, ticks: { callback: v => '$'+v } } }
      }
    });

    // Status donut chart
    new Chart(document.getElementById('chart-status').getContext('2d'), {
      type: 'doughnut',
      data: { labels: statusKeys.map(s => s.replace(/_/g,' ')), datasets: [{ data: statusVals, backgroundColor: statusBg, borderWidth: 0 }] },
      options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { font: { size: 11 } } } } }
    });

    // Booking trend line chart
    new Chart(document.getElementById('chart-trend').getContext('2d'), {
      type: 'line',
      data: {
        labels: monthLabels,
        datasets: [{
          label: 'Bookings', data: monthCounts,
          borderColor: '#ff3b30', backgroundColor: 'rgba(255,59,48,0.1)',
          tension: 0.3, fill: true, pointBackgroundColor: '#ff3b30', pointRadius: 4
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
      }
    });
  } catch(e) { alert('Failed: ' + e.message); }
}

// ==================== ADMIN NOTIFICATIONS (PUSH) ====================
async function showNotifications() {
  let stats = { users_with_push: 0, customers_with_push: 0, admins_with_push: 0, total_users: 0 };
  try { stats = await api('/admin/notifications/audience-stats'); } catch (e) { /* ignore */ }

  render(`
    <div class="header">
      <div><h1>DAMS <span>CAR RENTAL</span></h1></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-sm btn-gray" onclick="showDashboard()">← Cars</button>
        <button class="btn btn-sm btn-gray" onclick="showBookings()">Bookings</button>
        <button class="btn btn-sm btn-gray" onclick="doLogout()">Logout</button>
      </div>
    </div>
    <div class="container" style="max-width:780px">
      <h2 style="font-size:24px;font-weight:900;margin-bottom:6px">📣 Send Push Notification</h2>
      <p style="color:#666;font-size:13px;margin-bottom:20px">Broadcast a message to your customers' mobile devices.</p>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px">
        <div style="background:#fff;border-radius:14px;padding:14px;border:1px solid #e5e5e5;text-align:center">
          <div style="font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;font-weight:700">Reachable</div>
          <div style="font-size:24px;font-weight:900;color:#34c759">${stats.users_with_push||0}</div>
          <div style="font-size:11px;color:#999">of ${stats.total_users||0} users</div>
        </div>
        <div style="background:#fff;border-radius:14px;padding:14px;border:1px solid #e5e5e5;text-align:center">
          <div style="font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;font-weight:700">Customers</div>
          <div style="font-size:24px;font-weight:900;color:#007aff">${stats.customers_with_push||0}</div>
        </div>
        <div style="background:#fff;border-radius:14px;padding:14px;border:1px solid #e5e5e5;text-align:center">
          <div style="font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;font-weight:700">Admins</div>
          <div style="font-size:24px;font-weight:900;color:#5856d6">${stats.admins_with_push||0}</div>
        </div>
      </div>

      <div style="background:#fff;border-radius:18px;padding:20px;border:1px solid #e5e5e5">
        <div class="form-group">
          <label>Audience</label>
          <select class="input" id="n-target">
            <option value="customers">📱 Customers only (${stats.customers_with_push||0} devices)</option>
            <option value="all">🌍 Everyone (${stats.users_with_push||0} devices)</option>
            <option value="admins">🛠️ Admins only (${stats.admins_with_push||0} devices)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Title <span style="color:#999;font-weight:normal;font-size:11px">(max 100)</span></label>
          <input class="input" id="n-title" maxlength="100" placeholder="e.g. Weekend special — 20% off!" />
        </div>
        <div class="form-group">
          <label>Message <span style="color:#999;font-weight:normal;font-size:11px">(max 500)</span></label>
          <textarea class="input" id="n-body" rows="4" maxlength="500" placeholder="Book this weekend and save 20% on any car rental. Tap to browse."></textarea>
        </div>
        <div id="n-preview" style="background:#0a0a0a;color:#fff;border-radius:12px;padding:14px;margin:14px 0;font-size:13px;display:none">
          <div style="font-size:10px;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Preview</div>
          <div id="n-prev-title" style="font-weight:700;font-size:14px"></div>
          <div id="n-prev-body" style="color:#ccc;margin-top:2px"></div>
        </div>
        <div style="display:flex;gap:10px;margin-top:8px">
          <button class="btn" style="background:#ff9500;color:#fff;flex:1" onclick="sendNotification()">📣 Send Notification</button>
          <button class="btn btn-gray" onclick="showDashboard()">Cancel</button>
        </div>
      </div>

      <div style="margin-top:14px;padding:14px;background:#fff8e6;border:1px solid #ffe5a1;border-radius:12px;font-size:12px;color:#8a6500">
        ℹ️ Notifications only reach users with the mobile app installed who have granted notification permission. Tokens are collected automatically after login on the mobile app.
      </div>
    </div>
  `);

  // Live preview
  const updatePreview = () => {
    const t = document.getElementById('n-title').value.trim();
    const b = document.getElementById('n-body').value.trim();
    const box = document.getElementById('n-preview');
    if (t || b) {
      box.style.display = 'block';
      document.getElementById('n-prev-title').textContent = t || '(no title)';
      document.getElementById('n-prev-body').textContent = b || '(no message)';
    } else {
      box.style.display = 'none';
    }
  };
  document.getElementById('n-title').addEventListener('input', updatePreview);
  document.getElementById('n-body').addEventListener('input', updatePreview);
}

async function sendNotification() {
  const title = document.getElementById('n-title').value.trim();
  const body = document.getElementById('n-body').value.trim();
  const target = document.getElementById('n-target').value;
  if (!title || !body) return alert('Please enter both a title and a message.');
  if (!confirm(`Send this notification to "${target}"?\n\nTitle: ${title}\nMessage: ${body}`)) return;
  try {
    const res = await api('/admin/notifications/send', {
      method: 'POST',
      body: JSON.stringify({ title, body, target }),
    });
    let msg = `Sent: ${res.sent||0} / ${res.requested||0} devices accepted by Expo\n`;
    msg += `Recipients (users matched): ${res.total_recipients||0}\n`;
    if (res.invalid_tokens_removed) {
      msg += `\n⚠️ Cleaned up ${res.invalid_tokens_removed} stale token(s) (DeviceNotRegistered)`;
    }
    if (res.errors && res.errors.length) {
      msg += `\n\n⚠️ ${res.errors.length} delivery error(s):\n`;
      res.errors.slice(0,5).forEach(e => {
        msg += `  • ${e.error_code || e.status || 'unknown'}${e.message ? ': ' + e.message : ''}\n`;
      });
    }
    if ((res.sent||0) === 0) {
      msg = '⚠️ Sent to 0 devices.\n\n' + msg + '\nLikely cause: tokens are invalid (e.g., APK built without an EAS project ID, or notification permission was denied).';
      alert(msg);
    } else {
      alert('✅ Notification sent!\n\n' + msg);
    }
    document.getElementById('n-title').value = '';
    document.getElementById('n-body').value = '';
    document.getElementById('n-preview').style.display = 'none';
    // Refresh audience stats in case stale tokens were removed
    showNotifications();
  } catch (e) {
    alert('Failed to send: ' + (e.message || e));
  }
}

function removeImage(idx) {
  const imgs = getAllImages();
  imgs.splice(idx, 1);
  setAllImages(imgs);
}

function makeMainImage(idx) {
  const imgs = getAllImages();
  const [chosen] = imgs.splice(idx, 1);
  imgs.unshift(chosen);
  setAllImages(imgs);
}

async function uploadImages(input) {
  const files = Array.from(input.files || []);
  if (files.length === 0) return;
  const status = document.getElementById('upload-status');
  const imgs = getAllImages();
  let done = 0, failed = 0;
  for (const file of files) {
    status.innerHTML = `<span style="color:#007aff;font-size:13px">⏳ Uploading ${done+1} of ${files.length}...</span>`;
    try {
      const compressed = await compressImage(file, 1200, 0.85);
      const base64 = compressed.dataUrl.split(',')[1];
      const res = await api('/upload/image', {
        method: 'POST',
        body: JSON.stringify({ image_data: base64, filename: 'car_' + Date.now() + '_' + done + '.jpg' })
      });
      imgs.push(res.url);
      done++;
    } catch(e) { failed++; }
  }
  setAllImages(imgs);
  status.innerHTML = `<span style="color:#34c759;font-size:13px">✅ ${done} photo(s) uploaded${failed?`, ${failed} failed`:''}</span>`;
  input.value = '';
}

// Canvas-based image compression – resizes large photos and converts to JPEG
function compressImage(file, maxSize, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxSize || h > maxSize) {
          if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
          else { w = Math.round(w * maxSize / h); h = maxSize; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        // Approximate byte size of the base64 string
        const size = Math.round((dataUrl.length - 22) * 3 / 4);
        resolve({ dataUrl, size });
      };
      img.onerror = () => reject(new Error('Could not read image'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('Could not read file'));
    reader.readAsDataURL(file);
  });
}

        </div>
        <div class="tabs" style="flex-wrap:wrap">
          ${statuses.map(s => `<span class="tab ${bookingsFilter===s.k?'active':''}" onclick="bookingsFilter='${s.k}';showBookings()">${s.label}</span>`).join('')}
        </div>
        ${bookings.length === 0 ? '<p style="color:#999;text-align:center;padding:40px">No bookings found.</p>' : bookings.map(b => bookingCard(b)).join('')}
      </div>
      <div id="modal-root"></div>
    `);
  } catch(e) { alert('Failed: '+e.message); }
}

function bookingCard(b) {
  const statusColors = {
    pending_payment:'#ff9500', pending:'#ff9500',
    confirmed:'#007aff', active:'#34c759',
    completed:'#5856d6', cancelled:'#ff3b30'
  };
  const payColors = {
    paid:'#34c759', succeeded:'#34c759', cash_paid:'#34c759',
    pending:'#ff9500', unpaid:'#ff9500',
    refunded:'#8e8e93', failed:'#ff3b30'
  };
  const payLabels = {
    paid:'PAID', succeeded:'PAID', cash_paid:'PAID',
    pending:'UNPAID', unpaid:'UNPAID',
    refunded:'REFUNDED', failed:'FAILED'
  };
  const color = statusColors[b.status] || '#666';
  const statusLabel = (b.status||'').replace(/_/g,' ').toUpperCase();
  const payCol = payColors[b.payment_status] || '#999';
  const payLab = payLabels[b.payment_status] || (b.payment_method === 'cash' ? 'CASH PENDING' : 'UNKNOWN');
  const pickup = (b.pickup_date||'').substring(0,10);
  const dropoff = (b.dropoff_date||'').substring(0,10);
  const created = b.created_at ? new Date(b.created_at).toLocaleDateString() : '';
  return `<div class="card" style="flex-direction:column;align-items:stretch;gap:0;padding:0;overflow:hidden">
    <div style="display:flex;align-items:center;gap:14px;padding:14px">
      <img src="${b.car_image || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22/>'}" style="width:80px;height:56px;border-radius:10px;object-fit:cover;background:#f5f5f5">
      <div style="flex:1;min-width:0">
        <h3 style="font-size:15px;font-weight:700;margin-bottom:2px">${b.car_name||'Car'}</h3>
        <p style="font-size:12px;color:#666">${b.user_name||'Customer'} · ${b.user_email||''}</p>
        <p style="font-size:11px;color:#999;margin-top:2px">${pickup} → ${dropoff} · ${b.days||0} days · ${created}</p>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
        <span style="background:${color}1a;color:${color};padding:4px 10px;border-radius:50px;font-size:10px;font-weight:800;white-space:nowrap">${statusLabel}</span>
        <span style="background:${payCol}1a;color:${payCol};padding:4px 10px;border-radius:50px;font-size:10px;font-weight:800;white-space:nowrap">💳 ${payLab}</span>
      </div>
    </div>
    <div style="display:flex;border-top:1px solid #f0f0f0;background:#fafafa;padding:10px 14px;align-items:center;gap:8px;flex-wrap:wrap">
      <div style="flex:1;min-width:200px;font-size:12px;color:#666">
        Subtotal <strong style="color:#0a0a0a">$${(b.subtotal||0).toFixed(2)}</strong>
        · Tax ${b.tax_rate||0}% <strong style="color:#0a0a0a">$${(b.tax_amount||0).toFixed(2)}</strong>
        · <span style="color:#ff3b30;font-weight:800">Total $${(b.total_price||0).toFixed(2)}</span>
        · ${(b.payment_method||'cash').toUpperCase()}
      </div>
      <button class="btn btn-sm btn-blue" onclick="downloadReceipt('${b.id}')">📄 Receipt</button>
      ${(b.payment_status !== 'paid' && (b.payment_method||'cash') === 'cash') ? `<button class="btn btn-sm" style="background:#34c759;color:#fff" onclick="markCashPaid('${b.id}')">💰 Mark Cash Paid</button>` : ''}
      <select class="input" style="width:auto;padding:6px 10px;margin:0;font-size:12px" onchange="updateBookingStatus('${b.id}', this.value)">
        <option value="">Change status...</option>
        <option value="pending_payment">Pending Payment</option>
        <option value="confirmed">Confirmed</option>
        <option value="active">Active</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>
  </div>`;
}

async function updateBookingStatus(id, status) {
  if (!status) return;
  if (!confirm('Change booking status to "' + status.replace(/_/g,' ') + '"?')) return;
  try {
    await api('/admin/bookings/'+id+'/status', {method:'PUT', body: JSON.stringify({status})});
    showBookings();
  } catch(e) { alert('Failed: '+e.message); }
}

async function markCashPaid(id) {
  if (!confirm('Mark this cash booking as PAID and CONFIRMED?\n\nUse this once you have collected the cash from the customer.')) return;
  try {
    await api('/admin/bookings/'+id+'/status', {method:'PUT', body: JSON.stringify({status:'confirmed', payment_status:'paid'})});
    showBookings();
  } catch(e) { alert('Failed: '+e.message); }
}

async function downloadReceipt(id) {
  try {
    const res = await fetch(API + '/bookings/' + id + '/receipt.pdf', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!res.ok) throw new Error('Could not fetch receipt');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  } catch(e) { alert('Failed to open receipt: ' + e.message); }
}

  render(`

      <div style="background:#fff;border-radius:16px;padding:24px;border:1px solid #e5e5e5;margin-bottom:16px">
        <h3 style="font-size:16px;font-weight:700;margin-bottom:8px">Step 1: Export from Preview</h3>
        <p style="color:#666;font-size:13px;margin-bottom:16px">Open this page on the <strong>preview</strong> admin panel and click Export. It will copy all data to your clipboard.</p>
        <button class="btn btn-blue" onclick="exportData()">Export Data to Clipboard</button>
        <div id="export-result" style="margin-top:12px"></div>
      </div>

      <div style="background:#fff;border-radius:16px;padding:24px;border:1px solid #e5e5e5;margin-bottom:16px">

        <p style="color:#666;font-size:13px;margin-bottom:16px">If old bookings show "Tax 0%" or "$0.00 subtotal" on receipts, click below. This retroactively computes subtotal and tax amount for every booking using each booking's pickup-location tax rate. The grand total stays the same.</p>
        <button class="btn btn-blue" onclick="backfillTaxes()">Recompute Booking Taxes</button>
        <div id="backfill-result" style="margin-top:12px"></div>
      </div>

      <div style="background:#fff;border-radius:16px;padding:24px;border:1px solid #e5e5e5;margin-bottom:16px">
        <h3 style="font-size:16px;font-weight:700;margin-bottom:8px">🛠️ Fix Vehicle Images (Run on THIS environment)</h3>
        <p style="color:#666;font-size:13px;margin-bottom:16px">If vehicle photos are showing as broken, click below. This converts all uploaded file-based images into portable base64 images stored in the database. Run this once on Preview (before exporting) and once on Production (after importing).</p>
        <button class="btn btn-blue" onclick="migrateImages()">Convert Images to Portable Format</button>
        <div id="migrate-result" style="margin-top:12px"></div>
      </div>
      
      <div style="background:#fff;border-radius:16px;padding:24px;border:1px solid #e5e5e5;margin-bottom:16px">
        <h3 style="font-size:16px;font-weight:700;margin-bottom:8px">Step 2: Import to Production</h3>
        <p style="color:#666;font-size:13px;margin-bottom:16px">Open this page on the <strong>production</strong> admin panel, paste the exported data below, and click Import. Duplicates are skipped.</p>
        <textarea class="input" id="import-data" rows="6" placeholder="Paste exported JSON data here..."></textarea>
        <button class="btn btn-red" style="margin-top:8px" onclick="importData()">Import Data</button>
        <div id="import-result" style="margin-top:12px"></div>
      </div>

      <div style="background:#f0f8ff;border-radius:16px;padding:20px;border:1px solid #cce5ff">
        <h3 style="font-size:14px;font-weight:700;margin-bottom:6px">ℹ️ How it works</h3>
        <ul style="color:#666;font-size:13px;padding-left:20px;line-height:1.8">
          <li>On <strong>Preview</strong>: click <strong>Convert Images to Portable Format</strong> first, then <strong>Export</strong></li>
          <li>On <strong>Production</strong>: <strong>Paste</strong> the JSON and click <strong>Import</strong></li>
          <li>Existing cars/locations with the same name are skipped (no duplicates)</li>

        </ul>
      </div>
    </div>
  `);
}

async function exportData() {
  try {
    const data = await api('/admin/export');
    const json = JSON.stringify(data);
    await navigator.clipboard.writeText(json);
    document.getElementById('export-result').innerHTML = '<div style="color:#34c759;font-weight:700;font-size:14px">✅ Copied! ' + data.count.cars + ' cars and ' + data.count.locations + ' locations exported to clipboard.</div>';
  } catch(e) {
    // Fallback: show in textarea for manual copy
    try {
      const data = await api('/admin/export');
      const json = JSON.stringify(data);
      document.getElementById('export-result').innerHTML = '<p style="color:#666;font-size:12px;margin-bottom:4px">Clipboard not available. Copy the text below manually:</p><textarea class="input" rows="4" onclick="this.select()">' + json.replace(/</g,'&lt;') + '</textarea>';
    } catch(e2) { document.getElementById('export-result').innerHTML = '<div style="color:#ff3b30">Error: '+e2.message+'</div>'; }
  }
}

async function importData() {
  const raw = document.getElementById('import-data').value.trim();
  if (!raw) { alert('Please paste the exported data first'); return; }
  try {
    const data = JSON.parse(raw);
    if (!data.cars && !data.locations) { alert('Invalid data format'); return; }
    const result = await api('/admin/import', {method:'POST', body: JSON.stringify(data)});
    document.getElementById('import-result').innerHTML = '<div style="color:#34c759;font-weight:700;font-size:14px">✅ ' + result.message + '</div>';
  } catch(e) {
    document.getElementById('import-result').innerHTML = '<div style="color:#ff3b30">Error: '+e.message+'</div>';
  }
}

async function migrateImages() {
  const box = document.getElementById('migrate-result');
  box.innerHTML = '<span style="color:#007aff;font-size:13px">⏳ Converting images...</span>';
  try {
    const r = await api('/admin/migrate-images', {method:'POST', body:'{}'});
    box.innerHTML = '<div style="color:#34c759;font-weight:700;font-size:14px">✅ ' + r.message + '</div>';
  } catch(e) {
    box.innerHTML = '<div style="color:#ff3b30">Error: '+e.message+'</div>';
  }
}

async function backfillTaxes() {
  const box = document.getElementById('backfill-result');
  box.innerHTML = '<span style="color:#007aff;font-size:13px">⏳ Recomputing taxes on all bookings...</span>';
  try {
    const r = await api('/admin/backfill-booking-taxes', {method:'POST', body:'{}'});
    box.innerHTML = '<div style="color:#34c759;font-weight:700;font-size:14px">✅ ' + r.message + '</div>';
  } catch(e) {
    box.innerHTML = '<div style="color:#ff3b30">Error: '+e.message+'</div>';
  }
}

if (token) { showDashboard(); } else { showLogin(); }
