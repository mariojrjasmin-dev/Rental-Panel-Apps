<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dams Car Rental - Admin</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
/* ==================== DESIGN TOKENS (LIGHT + DARK) ==================== */
:root {
  --brand: #ff3b30;
  --brand-hover: #e0332b;
  --brand-soft: #ffe9e8;

  --bg: #f5f6f8;
  --bg-elevated: #ffffff;
  --bg-subtle: #fafafa;
  --bg-hover: #f0f0f3;

  --text: #0a0a0a;
  --text-muted: #6b7280;
  --text-subtle: #9ca3af;

  --border: #e5e7eb;
  --border-strong: #d1d5db;

  --sidebar-bg: #0f1115;
  --sidebar-text: #d6d8de;
  --sidebar-text-active: #ffffff;
  --sidebar-active-bg: rgba(255,255,255,0.08);
  --sidebar-active-bar: #ff3b30;
  --sidebar-section: #6e7280;
  --sidebar-divider: rgba(255,255,255,0.08);

  --topbar-bg: rgba(255,255,255,0.92);
  --topbar-border: #ececef;

  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --info: #3b82f6;

  --shadow-sm: 0 1px 2px rgba(15,17,21,0.04), 0 1px 1px rgba(15,17,21,0.04);
  --shadow-md: 0 4px 12px rgba(15,17,21,0.06), 0 2px 4px rgba(15,17,21,0.04);
  --shadow-lg: 0 12px 32px rgba(15,17,21,0.12), 0 4px 8px rgba(15,17,21,0.06);

  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 22px;

  --sidebar-w: 248px;
  --topbar-h: 60px;
}
html[data-theme="dark"] {
  --bg: #0b0d12;
  --bg-elevated: #14171d;
  --bg-subtle: #1a1e25;
  --bg-hover: #1f242c;

  --text: #f5f5f7;
  --text-muted: #a4a8b3;
  --text-subtle: #71757f;

  --border: #242932;
  --border-strong: #2f3540;

  --sidebar-bg: #07090c;
  --sidebar-text: #c6c9d1;
  --sidebar-active-bg: rgba(255,255,255,0.06);

  --topbar-bg: rgba(20,23,29,0.92);
  --topbar-border: #1f242c;

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.5);
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; }
button, input, select, textarea { font-family: inherit; color: inherit; }

/* ==================== APP SHELL (SIDEBAR + TOPBAR + MAIN) ==================== */
.app-shell { display: flex; min-height: 100vh; }
.app-sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w);
  background: var(--sidebar-bg); color: var(--sidebar-text);
  display: flex; flex-direction: column; padding: 18px 12px 12px;
  z-index: 100; transition: transform .25s ease;
  border-right: 1px solid var(--sidebar-divider);
}
.app-sidebar .sb-brand { display: flex; align-items: center; gap: 10px; padding: 4px 10px 16px; border-bottom: 1px solid var(--sidebar-divider); margin-bottom: 12px; }
.app-sidebar .sb-brand img { height: 32px; width: auto; max-width: 160px; object-fit: contain; }
.app-sidebar .sb-brand .sb-pill { font-size: 9px; color: #fff; background: var(--brand); padding: 2px 8px; border-radius: 50px; font-weight: 800; letter-spacing: 1px; }
.app-sidebar .sb-section { font-size: 10px; color: var(--sidebar-section); font-weight: 800; letter-spacing: 1.4px; text-transform: uppercase; padding: 14px 14px 6px; }
.app-sidebar .sb-item {
  display: flex; align-items: center; gap: 12px; padding: 11px 14px;
  border-radius: 10px; color: var(--sidebar-text); cursor: pointer;
  font-size: 13.5px; font-weight: 600; position: relative;
  transition: background .12s ease, color .12s ease;
  border: 1px solid transparent;
}
.app-sidebar .sb-item:hover { background: var(--sidebar-active-bg); color: var(--sidebar-text-active); }
.app-sidebar .sb-item.active {
  background: var(--sidebar-active-bg); color: var(--sidebar-text-active);
}
.app-sidebar .sb-item.active::before {
  content: ''; position: absolute; left: 0; top: 6px; bottom: 6px; width: 3px; background: var(--sidebar-active-bar); border-radius: 2px;
}
.app-sidebar .sb-item .sb-icon { font-size: 16px; width: 20px; text-align: center; }
.app-sidebar .sb-item.danger { color: #ff9b94; margin-top: 6px; }
.app-sidebar .sb-item.danger:hover { background: rgba(255,59,48,0.12); color: #ff5247; }
.app-sidebar .sb-footer { margin-top: auto; padding: 12px 8px 4px; border-top: 1px solid var(--sidebar-divider); }
.app-sidebar .sb-user { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px; }
.app-sidebar .sb-user .sb-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--brand); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; }
.app-sidebar .sb-user .sb-name { font-size: 12.5px; font-weight: 700; color: var(--sidebar-text-active); line-height: 1.2; }
.app-sidebar .sb-user .sb-role { font-size: 10px; color: var(--sidebar-section); font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; }

.app-main { flex: 1; min-width: 0; margin-left: var(--sidebar-w); display: flex; flex-direction: column; transition: margin-left .2s ease; }
.app-main.no-sidebar { margin-left: 0; }
.app-topbar {
  position: sticky; top: 0; z-index: 50;
  height: var(--topbar-h); background: var(--topbar-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--topbar-border);
  display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
}
.app-topbar .tb-title { display: flex; align-items: center; gap: 10px; }
.app-topbar .tb-title h1 { font-size: 17px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; }
.app-topbar .tb-title .tb-crumb { font-size: 12px; color: var(--text-subtle); font-weight: 600; }
.app-topbar .tb-actions { display: flex; align-items: center; gap: 8px; }
.app-topbar .tb-icon-btn {
  width: 38px; height: 38px; border-radius: 10px; background: transparent; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); font-size: 16px;
  transition: background .12s ease, border-color .12s ease;
}
.app-topbar .tb-icon-btn:hover { background: var(--bg-hover); border-color: var(--border-strong); }

.hamburger { display: none; }
.app-content { flex: 1; padding: 28px; max-width: 1280px; width: 100%; margin: 0 auto; }

/* ==================== MOBILE RESPONSIVE ==================== */
@media (max-width: 900px) {
  .app-sidebar { transform: translateX(-100%); width: 280px; box-shadow: var(--shadow-lg); }
  .app-sidebar.open { transform: translateX(0); }
  .app-main { margin-left: 0; }
  .hamburger { display: flex !important; }
  .app-content { padding: 16px; }
  .sb-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; display: none; }
  .sb-overlay.show { display: block; }
}

/* ==================== LEGACY HEADER SUPPRESSION ==================== */
/* Hide the old in-page .header & .admin-nav (now provided by sidebar+topbar). */
.app-content .header, .app-content .admin-nav,
#app .header, #app .admin-nav { display: none !important; }
.app-content .container, #app .container { max-width: 100%; padding: 0 28px 28px; margin: 0; }
#app .container .header { display: none !important; }

/* When sidebar is hidden (login), let the app fill the screen */
.app-main.no-sidebar { padding: 0; }

/* ==================== KPI CARDS (Dashboard) ==================== */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 28px; }
.kpi {
  background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 18px 20px; display: flex; flex-direction: column; gap: 6px; box-shadow: var(--shadow-sm);
  transition: transform .15s ease, box-shadow .15s ease;
}
.kpi:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
.kpi .kpi-row { display: flex; align-items: center; justify-content: space-between; }
.kpi .kpi-label { font-size: 11px; color: var(--text-muted); font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
.kpi .kpi-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; }
.kpi .kpi-value { font-size: 28px; font-weight: 900; color: var(--text); letter-spacing: -0.5px; line-height: 1.1; }
.kpi .kpi-delta { font-size: 11px; font-weight: 700; color: var(--text-muted); }
.kpi .kpi-delta.up { color: var(--success); }
.kpi .kpi-delta.down { color: var(--danger); }

/* Color-coded kpi backgrounds (icon only) */
.kpi-icon.kpi-red { background: var(--brand-soft); color: var(--brand); }
.kpi-icon.kpi-blue { background: #e0eaff; color: var(--info); }
.kpi-icon.kpi-green { background: #d1fae5; color: var(--success); }
.kpi-icon.kpi-amber { background: #fef3c7; color: var(--warning); }
.kpi-icon.kpi-purple { background: #ede9fe; color: #8b5cf6; }
html[data-theme="dark"] .kpi-icon.kpi-red { background: rgba(255,59,48,0.18); }
html[data-theme="dark"] .kpi-icon.kpi-blue { background: rgba(59,130,246,0.18); }
html[data-theme="dark"] .kpi-icon.kpi-green { background: rgba(16,185,129,0.18); }
html[data-theme="dark"] .kpi-icon.kpi-amber { background: rgba(245,158,11,0.18); }
html[data-theme="dark"] .kpi-icon.kpi-purple { background: rgba(139,92,246,0.18); }

/* ==================== SECTION TITLES & TOOLBARS ==================== */
.page-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 12px; }
.page-title h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.3px; color: var(--text); }
.page-title .pt-sub { font-size: 13px; color: var(--text-muted); font-weight: 500; margin-top: 2px; }

/* ==================== BUTTONS ==================== */
.btn {
  padding: 10px 18px; border: 1px solid transparent; border-radius: 10px; cursor: pointer;
  font-weight: 700; font-size: 13.5px; min-height: 40px; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  transition: background .12s ease, border-color .12s ease, transform .08s ease, box-shadow .12s ease;
  white-space: nowrap;
}
.btn:active { transform: translateY(1px); }
.btn-red { background: var(--brand); color: #fff; border-color: var(--brand); box-shadow: 0 1px 2px rgba(255,59,48,0.25); }
.btn-red:hover { background: var(--brand-hover); border-color: var(--brand-hover); }
.btn-gray { background: var(--bg-elevated); color: var(--text); border-color: var(--border); }
.btn-gray:hover { background: var(--bg-hover); }
.btn-blue { background: var(--info); color: #fff; border-color: var(--info); }
.btn-blue:hover { filter: brightness(0.95); }
.btn-sm { padding: 7px 12px; font-size: 12.5px; min-height: 34px; border-radius: 8px; }
.btn-icon { width: 38px; height: 38px; padding: 0; }

/* ==================== INPUTS & FORMS ==================== */
.input, input[type="text"].input, input[type="email"].input, input[type="password"].input, input[type="number"].input, input[type="date"].input, input[type="time"].input, input[type="file"].input, textarea.input, select.input {
  width: 100%; padding: 11px 14px; min-height: 42px;
  border: 1px solid var(--border); border-radius: 10px; font-size: 14px;
  background: var(--bg-elevated); color: var(--text);
  transition: border-color .12s ease, box-shadow .12s ease;
}
.input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(255,59,48,0.12); }
.input::placeholder { color: var(--text-subtle); }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.form-row { display: flex; gap: 12px; flex-wrap: wrap; }
.form-row .form-group { flex: 1 1 180px; }

/* ==================== TABS ==================== */
.tabs { display: flex; gap: 4px; margin-bottom: 20px; padding: 4px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; }
.tab { padding: 8px 16px; border-radius: 8px; border: none; background: transparent; cursor: pointer; font-weight: 600; font-size: 13px; color: var(--text-muted); min-height: 36px; white-space: nowrap; }
.tab:hover { background: var(--bg-hover); color: var(--text); }
.tab.active { background: var(--brand); color: #fff; }

/* ==================== CARDS / LIST ITEMS ==================== */
.card {
  background: var(--bg-elevated); border-radius: var(--radius-lg); padding: 16px;
  margin-bottom: 12px; border: 1px solid var(--border); display: flex; align-items: center; gap: 14px;
  box-shadow: var(--shadow-sm); transition: box-shadow .15s ease, transform .15s ease;
}
.card:hover { box-shadow: var(--shadow-md); }
.card img { width: 88px; height: 64px; border-radius: 12px; object-fit: cover; background: var(--bg-hover); }
.card-info { flex: 1; min-width: 0; }
.card-info h3 { font-size: 15px; font-weight: 700; color: var(--text); }
.card-info p { font-size: 12.5px; color: var(--text-muted); margin-top: 3px; }
.card-actions { display: flex; gap: 6px; flex-wrap: wrap; }

/* Legacy .stats grid — restyle to look like KPI cards */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat { background: var(--bg-elevated); border-radius: var(--radius-lg); padding: 18px 16px; text-align: left; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
.stat .num { font-size: 26px; font-weight: 900; color: var(--text); letter-spacing: -0.4px; }
.stat .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-top: 4px; }

/* ==================== TABLES (modernized, less dense) ==================== */
table { width: 100%; border-collapse: collapse; background: var(--bg-elevated); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
th, td { padding: 14px 16px; font-size: 13px; text-align: left; border-bottom: 1px solid var(--border); color: var(--text); }
thead th { background: var(--bg-subtle); color: var(--text-muted); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.6px; }
tbody tr:hover { background: var(--bg-hover); }
tbody tr:last-child td { border-bottom: none; }

/* ==================== BADGES ==================== */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 50px; font-size: 11px; font-weight: 700; letter-spacing: 0.2px; }
.badge-green { background: #d1fae5; color: #065f46; }
.badge-red { background: #fee2e2; color: #991b1b; }
.badge-amber { background: #fef3c7; color: #92400e; }
.badge-blue { background: #e0eaff; color: #1e3a8a; }
.badge-gray { background: var(--bg-hover); color: var(--text-muted); }
html[data-theme="dark"] .badge-green { background: rgba(16,185,129,0.18); color: #6ee7b7; }
html[data-theme="dark"] .badge-red { background: rgba(239,68,68,0.18); color: #fca5a5; }
html[data-theme="dark"] .badge-amber { background: rgba(245,158,11,0.18); color: #fcd34d; }
html[data-theme="dark"] .badge-blue { background: rgba(59,130,246,0.18); color: #93c5fd; }

/* ==================== MODALS ==================== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(15,17,21,0.5); backdrop-filter: blur(4px);
  display: flex; justify-content: center; align-items: flex-start; padding: 60px 16px 16px; z-index: 200; overflow-y: auto;
  animation: modalFade .18s ease;
}
@keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--bg-elevated); border-radius: var(--radius-xl); width: 100%; max-width: 600px;
  padding: 28px; border: 1px solid var(--border); box-shadow: var(--shadow-lg);
  animation: modalSlide .22s ease;
}
@keyframes modalSlide { from { transform: translateY(-12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal h2 { font-size: 20px; font-weight: 800; margin-bottom: 18px; color: var(--text); }

/* ==================== LOGIN ==================== */
.login-bg { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(135deg, var(--bg) 0%, var(--bg-elevated) 100%); }
.login-box { max-width: 420px; width: 100%; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 36px; box-shadow: var(--shadow-md); }
.login-box h2 { font-size: 26px; font-weight: 900; margin-bottom: 6px; color: var(--text); letter-spacing: -0.5px; }
.login-box p { color: var(--text-muted); margin-bottom: 24px; font-size: 14px; }
.login-logo { height: 64px; width: auto; max-width: 240px; object-fit: contain; display: block; margin: 0 auto 16px; }
.brand-logo { height: 36px; }

/* ==================== UTILITIES ==================== */
.hidden { display: none; }
.error { color: var(--brand); font-size: 13px; margin-bottom: 12px; background: var(--brand-soft); padding: 10px 14px; border-radius: 10px; border: 1px solid rgba(255,59,48,0.2); }
.section-title { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin: 24px 0 12px; color: var(--text-muted); }
.loc-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.loc-pill { padding: 7px 14px; border-radius: 50px; border: 1px solid var(--border); background: var(--bg-elevated); cursor: pointer; font-size: 11.5px; font-weight: 600; color: var(--text); }
.loc-pill:hover { background: var(--bg-hover); }
.loc-pill.active-green { background: var(--success); color: #fff; border-color: var(--success); }
.loc-pill.active-red { background: var(--brand); color: #fff; border-color: var(--brand); }
.selected-loc { background: var(--bg-subtle); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; margin-bottom: 6px; font-size: 13px; display: flex; align-items: center; gap: 8px; }
.selected-loc .dot { width: 10px; height: 10px; border-radius: 5px; }
.selected-loc .clear { cursor: pointer; color: var(--text-muted); margin-left: auto; }

/* Legacy admin-nav (now hidden by .app-content rule above, but keep style for back-compat) */
.admin-nav { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.admin-id-pill { display: inline-flex; align-items: center; gap: 8px; background: var(--bg-hover); padding: 6px 10px; border-radius: 50px; font-size: 12px; color: var(--text); font-weight: 600; }
.admin-id-pill .dot { width: 8px; height: 8px; border-radius: 4px; background: var(--success); }

/* Old dropdown CSS — kept for any legacy use, but global nav is now in sidebar */
.nav-btn, .nav-dd, .nav-divider, .nav-dd-menu, .nav-dd-item, .nav-dd-sep, .nav-dd-label { display: none; }

/* ==================== POLISHED UTILITIES (Phase 2) ==================== */
/* Typography */
.t-muted { color: var(--text-muted) !important; }
.t-subtle { color: var(--text-subtle) !important; }
.t-strong { color: var(--text) !important; font-weight: 800; }
.t-mono { font-variant-numeric: tabular-nums; }
.t-uppercase { text-transform: uppercase; letter-spacing: 0.5px; }
.t-eyebrow { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; }
.t-total { color: var(--brand); font-weight: 900; }
.t-link { color: var(--info); text-decoration: none; }
.t-link:hover { text-decoration: underline; }

/* Layout helpers */
.row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.row-between { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
.col { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
.divider { border-top: 1px solid var(--border); margin: 16px 0; }
.divider-soft { border-top: 1px solid var(--border); }

/* Empty state */
.empty-state {
  text-align: center; padding: 48px 24px; color: var(--text-muted);
  background: var(--bg-elevated); border: 1px dashed var(--border); border-radius: var(--radius-lg);
}
.empty-state .icon { font-size: 32px; margin-bottom: 8px; opacity: 0.6; }
.empty-state .title { font-weight: 800; color: var(--text); font-size: 15px; margin-bottom: 4px; }
.empty-state .sub { font-size: 13px; color: var(--text-muted); }

/* Stat tiles (for in-modal mini stats) */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
.stat-tile {
  border-radius: var(--radius); padding: 14px; text-align: center;
  background: var(--bg-subtle); border: 1px solid var(--border);
}
.stat-tile .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-tile .stat-value { font-size: 22px; font-weight: 900; color: var(--text); margin-top: 4px; letter-spacing: -0.3px; }
.stat-tile.tile-blue { background: rgba(59,130,246,0.10); border-color: rgba(59,130,246,0.18); }
.stat-tile.tile-blue .stat-value { color: var(--info); }
.stat-tile.tile-green { background: rgba(16,185,129,0.10); border-color: rgba(16,185,129,0.18); }
.stat-tile.tile-green .stat-value { color: var(--success); }
.stat-tile.tile-amber { background: rgba(245,158,11,0.10); border-color: rgba(245,158,11,0.18); }
.stat-tile.tile-amber .stat-value { color: var(--warning); }
html[data-theme="dark"] .stat-tile.tile-blue { background: rgba(59,130,246,0.16); }
html[data-theme="dark"] .stat-tile.tile-green { background: rgba(16,185,129,0.16); }
html[data-theme="dark"] .stat-tile.tile-amber { background: rgba(245,158,11,0.16); }

/* Info / warning / success callouts */
.callout {
  border-radius: var(--radius); padding: 12px 14px; border: 1px solid var(--border);
  background: var(--bg-subtle); font-size: 13px; line-height: 1.5;
  display: flex; align-items: flex-start; gap: 10px;
}
.callout .callout-icon { font-size: 18px; line-height: 1; }
.callout-warning { background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.28); color: #7a4500; }
.callout-info { background: rgba(59,130,246,0.10); border-color: rgba(59,130,246,0.22); color: var(--info); }
.callout-success { background: rgba(16,185,129,0.10); border-color: rgba(16,185,129,0.22); color: #065f46; }
.callout-danger { background: rgba(239,68,68,0.10); border-color: rgba(239,68,68,0.22); color: #991b1b; }
html[data-theme="dark"] .callout-warning { color: #fcd34d; }
html[data-theme="dark"] .callout-success { color: #6ee7b7; }
html[data-theme="dark"] .callout-danger { color: #fca5a5; }

/* Polished card variants for list rows (e.g., bookings, history items) */
.list-card {
  background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg);
  margin-bottom: 12px; overflow: hidden; box-shadow: var(--shadow-sm);
  transition: box-shadow .15s ease, transform .15s ease;
}
.list-card:hover { box-shadow: var(--shadow-md); }
.list-card .lc-head { display: flex; align-items: center; gap: 14px; padding: 14px; }
.list-card .lc-foot {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 10px 14px; background: var(--bg-subtle); border-top: 1px solid var(--border);
}
.list-card .lc-img { width: 80px; height: 56px; border-radius: 10px; object-fit: cover; background: var(--bg-hover); flex: 0 0 80px; }
.list-card .lc-title { font-size: 15px; font-weight: 700; color: var(--text); margin: 0; }
.list-card .lc-sub { font-size: 12.5px; color: var(--text-muted); margin: 2px 0 0; }
.list-card .lc-hint { font-size: 11.5px; color: var(--text-subtle); margin-top: 2px; }
.list-card .lc-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

/* Inline select used in row-actions (smaller, consistent with btn-sm) */
.select-inline {
  width: auto; min-height: 34px; padding: 7px 28px 7px 12px; font-size: 12.5px; margin: 0;
  border: 1px solid var(--border); border-radius: 8px; background: var(--bg-elevated); color: var(--text);
  cursor: pointer;
}
.select-inline:hover { border-color: var(--border-strong); background: var(--bg-hover); }

/* Modal header (replaces ad-hoc inline modal heads) */
.modal-head {
  position: sticky; top: 0; z-index: 1; background: var(--bg-elevated); border-bottom: 1px solid var(--border);
  padding: 18px 24px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
}
.modal-head .mh-title { font-size: 20px; font-weight: 900; color: var(--text); letter-spacing: -0.3px; }
.modal-head .mh-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
.modal-close {
  background: var(--bg-subtle); border: 1px solid var(--border); width: 36px; height: 36px;
  border-radius: 18px; cursor: pointer; font-size: 16px; color: var(--text);
  display: flex; align-items: center; justify-content: center; flex: 0 0 36px;
}
.modal-close:hover { background: var(--bg-hover); }
.modal-body { padding: 20px 24px; }
.modal-shell {
  background: var(--bg-elevated); border-radius: var(--radius-xl); width: 100%; max-width: 680px;
  max-height: 92vh; overflow-y: auto; border: 1px solid var(--border); box-shadow: var(--shadow-lg);
}
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(15,17,21,0.55); backdrop-filter: blur(4px);
  z-index: 1000; display: flex; align-items: flex-start; justify-content: center;
  padding: 24px 16px; overflow-y: auto; animation: modalFade .18s ease;
}

/* Status pills (smaller, neutral) — alongside .badge for finer-grained states */
.pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 50px; font-size: 10.5px; font-weight: 800;
  letter-spacing: 0.4px; text-transform: uppercase; white-space: nowrap;
}
.pill-green  { background: rgba(16,185,129,0.16); color: #047857; }
.pill-amber  { background: rgba(245,158,11,0.18); color: #92400e; }
.pill-red    { background: rgba(239,68,68,0.16);  color: #991b1b; }
.pill-blue   { background: rgba(59,130,246,0.16); color: #1e3a8a; }
.pill-purple { background: rgba(139,92,246,0.16); color: #5b21b6; }
.pill-gray   { background: var(--bg-hover); color: var(--text-muted); }
html[data-theme="dark"] .pill-green  { color: #6ee7b7; }
html[data-theme="dark"] .pill-amber  { color: #fcd34d; }
html[data-theme="dark"] .pill-red    { color: #fca5a5; }
html[data-theme="dark"] .pill-blue   { color: #93c5fd; }
html[data-theme="dark"] .pill-purple { color: #c4b5fd; }

/* Top page-search input — used in customers/bookings */
.page-search { max-width: 320px; margin: 0; }

</style>
</head>
<body>
<aside id="app-sidebar" class="app-sidebar" style="display:none"></aside>
<div id="sb-overlay" class="sb-overlay" onclick="toggleSidebar(false)"></div>
<div class="app-main" id="app-main">
  <div id="app"></div>
</div>
<script>
const API = window.location.origin + '/api';
let token = localStorage.getItem('admin_token');
let locations = [];
let activePage = 'dashboard';   // tracks the currently active sidebar item

// ==================== THEME (LIGHT / DARK) ====================
function applyTheme(theme) {
  const t = (theme === 'dark') ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', t);
  try { localStorage.setItem('admin_theme', t); } catch(e) {}
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = (t === 'dark') ? '☀️' : '🌙';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}
// Initialize theme on first load
(function initTheme() {
  let saved = null;
  try { saved = localStorage.getItem('admin_theme'); } catch(e) {}
  applyTheme(saved || 'light');
})();

// ==================== SIDEBAR ====================
const SIDEBAR_ITEMS = [
  { section: 'Operations' },
  { id: 'dashboard',  label: 'Dashboard',  icon: '🏠', fn: 'showDashboard', perm: 'dashboard.view' },
  { id: 'cars',       label: 'Vehicles',   icon: '🚗', fn: 'showCars', perm: 'cars.view' },
  { id: 'bookings',   label: 'Bookings',   icon: '📋', fn: 'showBookings', perm: 'bookings.view' },
  { id: 'pickups',    label: 'Pickups',    icon: '🔑', fn: 'showOperations', perm: 'pickups.view' },
  { id: 'locations',  label: 'Locations',  icon: '📍', fn: 'showLocations', perm: 'locations.view' },
  { id: 'customers',  label: 'Customers',  icon: '👥', fn: 'showCustomers', perm: 'customers.view' },
  { section: 'Reports & Marketing' },
  { id: 'analytics',  label: 'Analytics',  icon: '📈', fn: 'showAnalytics', perm: 'reports.view' },
  { id: 'reminders',  label: 'Payment reminders', icon: '💸', fn: 'showPaymentReminders', perm: 'settings.view' },
  { id: 'promos',     label: 'Promo codes', icon: '🎟️', fn: 'showPromos', perm: 'promo.view' },
  { id: 'push',       label: 'Push notifications', icon: '📣', fn: 'showNotifications', perm: 'notifications.send' },
  { section: 'Content' },
  { id: 'terms',      label: 'Terms & Conditions', icon: '📜', fn: 'showTerms', perm: 'settings.view' },
  { id: 'privacy',    label: 'Privacy Policy', icon: '🔒', fn: 'showPrivacy', perm: 'settings.view' },
  { section: 'Settings' },
  { id: 'password',   label: 'Change password', icon: '🔑', fn: 'showChangePassword' },
  { id: 'migration',  label: 'Import / Export', icon: '📦', fn: 'showMigration', perm: 'admins.manage' },
  { id: 'backup',     label: 'Backup & Restore DB', icon: '💾', fn: 'showDbBackup', superOnly: true },
  { section: 'Security', superOrAudit: true },
  { id: 'admins',     label: 'Admin users', icon: '👮', fn: 'showAdminUsers', superOnly: true },
  { id: 'audit',      label: 'Audit log',   icon: '📜', fn: 'showAuditLog', auditOrSuper: true },
];

// Helper — does the current admin have a given permission?
function adminHasPerm(p) {
  if (!p) return true; // unrestricted item
  if (!currentAdmin) return false;
  // Super admins implicitly have everything
  if (currentAdmin.is_super_admin) return true;
  const list = currentAdmin.permissions || [];
  return list.indexOf(p) !== -1;
}

function buildSidebar() {
  const sb = document.getElementById('app-sidebar');
  if (!sb) return;
  sb.style.display = 'flex';
  const name = (currentAdmin && (currentAdmin.name || currentAdmin.email)) || 'Admin';
  const role = (currentAdmin && (currentAdmin.is_super_admin ? 'Super admin' : 'Admin')) || '';
  const isSuper = !!(currentAdmin && currentAdmin.is_super_admin);
  const hasAudit = !!(currentAdmin && (currentAdmin.permissions || []).includes('audit.view'));

  // Pre-compute which items are visible for the current admin.
  const visible = SIDEBAR_ITEMS.map(item => {
    if (item.section) return true; // sections decided per-render below
    if (item.superOnly && !isSuper) return false;
    if (item.auditOrSuper && !(isSuper || hasAudit)) return false;
    if (item.perm && !adminHasPerm(item.perm)) return false;
    return true;
  });

  let html = `
    <div class="sb-brand">
      <img src="/api/assets/logo.png" alt="DAMS"/>
      <span class="sb-pill">ADMIN</span>
    </div>
    <div style="flex:1; overflow-y:auto; padding: 0 2px;">`;

  for (let i = 0; i < SIDEBAR_ITEMS.length; i++) {
    const item = SIDEBAR_ITEMS[i];
    if (item.section) {
      if (item.superOrAudit && !(isSuper || hasAudit)) continue;
      // Skip section header if EVERY item below it (until next section) is hidden
      let anyVisible = false;
      for (let j = i + 1; j < SIDEBAR_ITEMS.length; j++) {
        if (SIDEBAR_ITEMS[j].section) break;
        if (visible[j]) { anyVisible = true; break; }
      }
      if (!anyVisible) continue;
      html += `<div class="sb-section">${item.section}</div>`;
      continue;
    }
    if (!visible[i]) continue;
    const active = (activePage === item.id) ? 'active' : '';
    html += `<div class="sb-item ${active}" data-id="${item.id}" onclick="navigate('${item.id}','${item.fn}')">
      <span class="sb-icon">${item.icon}</span><span>${item.label}</span>
    </div>`;
  }
  html += `</div>
    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-avatar">${(name[0] || 'A').toUpperCase()}</div>
        <div style="flex:1; min-width:0;">
          <div class="sb-name" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${name}</div>
          <div class="sb-role">${role}</div>
        </div>
      </div>
      <div class="sb-item danger" onclick="doLogout()"><span class="sb-icon">⎋</span><span>Logout</span></div>
    </div>`;
  sb.innerHTML = html;
}

function navigate(id, fnName) {
  activePage = id;
  // Close mobile sidebar if open
  toggleSidebar(false);
  // Mark active in sidebar (light update without rebuilding)
  document.querySelectorAll('#app-sidebar .sb-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('data-id') === id);
  });
  try {
    const fn = window[fnName];
    if (typeof fn === 'function') fn();
  } catch (e) { console.error(e); }
}

function toggleSidebar(force) {
  const sb = document.getElementById('app-sidebar');
  const ov = document.getElementById('sb-overlay');
  if (!sb) return;
  const willOpen = (typeof force === 'boolean') ? force : !sb.classList.contains('open');
  sb.classList.toggle('open', willOpen);
  if (ov) ov.classList.toggle('show', willOpen);
}

// ==================== TOPBAR ====================
function topbar(title, subtitle, rightHtml) {
  return `
    <div class="app-topbar">
      <div class="tb-title">
        <button class="tb-icon-btn hamburger" onclick="toggleSidebar(true)" title="Menu" aria-label="Menu">☰</button>
        <div>
          <h1>${title || ''}</h1>
          ${subtitle ? `<div class="tb-crumb">${subtitle}</div>` : ''}
        </div>
      </div>
      <div class="tb-actions">
        ${rightHtml || ''}
        <button id="theme-toggle" class="tb-icon-btn" onclick="toggleTheme()" title="Toggle dark mode" aria-label="Toggle theme">${document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙'}</button>
      </div>
    </div>`;
}

// Shell wrapper. Pages call: render(shell({title:'X'}, contentHtml))
function shell(opts, content) {
  return `${topbar((opts && opts.title) || '', (opts && opts.subtitle) || '', (opts && opts.right) || '')}
    <div class="app-content">${content}</div>`;
}

// Helper: page functions can still pass their own .header + .container HTML; CSS hides those.
async function api(path, opts = {}) {
  const headers = {'Content-Type':'application/json', ...(opts.headers||{})};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API + path, {...opts, headers});
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail || 'Request failed'); }
  return res.json();
}

function render(html) {
  // Safety: remove any stray modals appended directly to <body> (from older bugs)
  // so they can't persist across page navigations.
  document.querySelectorAll('body > .modal, body > .modal-overlay').forEach(n => n.remove());

  // Auto-inject the modern topbar when user is logged in AND content doesn't already include it.
  const sb = document.getElementById('app-sidebar');
  const isLoggedIn = !!token && sb && sb.style.display !== 'none';
  const hasTopbar = html.includes('app-topbar');
  let finalHtml = html;
  if (isLoggedIn && !hasTopbar) {
    // Look up a default title from the active sidebar item
    const item = SIDEBAR_ITEMS.find(i => i.id === activePage) || {};
    const title = item.label || 'Admin';
    finalHtml = `${topbar(title, '', '')}<div class="app-content">${html}</div>`;
  }
  document.getElementById('app').innerHTML = finalHtml;
}

// ===== Dropdown helpers for the admin top nav =====
function closeDDs() {
  document.querySelectorAll('.nav-dd.open').forEach(el => el.classList.remove('open'));
}
function toggleDD(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const willOpen = !el.classList.contains('open');
  closeDDs();
  if (willOpen) el.classList.add('open');
}
document.addEventListener('click', (e) => {
  if (!e.target.closest('.nav-dd')) closeDDs();
});
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDDs(); });

// LOGIN
function showLogin(err='') {
  // Hide sidebar on login page + remove sidebar offset
  const sb = document.getElementById('app-sidebar');
  const ov = document.getElementById('sb-overlay');
  const main = document.getElementById('app-main');
  if (sb) { sb.style.display = 'none'; sb.classList.remove('open'); }
  if (ov) ov.classList.remove('show');
  if (main) main.classList.add('no-sidebar');
  render(`
    <div class="login-bg">
      <div class="login-box">
        <img class="login-logo" src="/api/assets/logo.png" alt="DAMS Rent a Car"/>
        <h2 style="text-align:center">Welcome back</h2>
        <p style="text-align:center">Sign in to the Admin Panel</p>
        ${err ? '<div class="error">'+err+'</div>' : ''}
        <div class="form-group">
          <label>Email</label>
          <input class="input" id="email" placeholder="you@example.com" value="admin@damscarrental.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input class="input" id="pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button class="btn btn-red" style="width:100%;margin-top:8px" onclick="doLogin()">Sign in →</button>
      </div>
    </div>
  `);
}

async function doLogin() {
  try {
    const r = await api('/auth/login', {method:'POST', body: JSON.stringify({email:document.getElementById('email').value, password:document.getElementById('pass').value})});
    if (r.role !== 'admin') throw new Error('Admin access required');
    token = r.token; localStorage.setItem('admin_token', token);
    showDashboard();
  } catch(e) { showLogin(e.message); }
}

// Helper: ensure shell is set up before rendering pages
async function ensureShell() {
  const main = document.getElementById('app-main');
  if (main) main.classList.remove('no-sidebar');
  const sb = document.getElementById('app-sidebar');
  if (sb) sb.style.display = 'flex';
  if (!currentAdmin) {
    await loadCurrentAdmin();
  }
  buildSidebar();
}

// ==================== DASHBOARD (new — KPI cards + recent activity) ====================
async function showDashboard() {
  activePage = 'dashboard';
  await ensureShell();

  let stats = {total_cars: '—', total_bookings: '—', total_users: '—', active_bookings: '—'};
  let cars = [];
  let bookings = [];
  try {
    const [s, c, b] = await Promise.all([api('/admin/stats'), api('/cars/all'), api('/admin/bookings').catch(()=>[])]);
    stats = s; cars = c; bookings = b;
    locations = await api('/locations');
  } catch(e) {
    token = null; localStorage.removeItem('admin_token');
    showLogin(e.message || 'Session expired. Please login again.');
    return;
  }

  // Compute revenue (this month) + active rentals + pending pickups
  const now = new Date();
  const ym = now.toISOString().slice(0,7);
  let revThisMonth = 0;
  let pendingPickups = 0;
  let activeRentals = 0;
  for (const b of bookings) {
    const c = (b.created_at || '').slice(0,7);
    if (c === ym && (b.payment_status === 'paid' || b.status === 'confirmed' || b.status === 'active' || b.status === 'completed')) {
      revThisMonth += Number(b.total_price || 0);
    }
    if (b.status === 'confirmed') pendingPickups++;
    if (b.status === 'active') activeRentals++;
  }

  // Recent bookings (latest 5)
  const recentRows = bookings.slice().sort((a,b) => (b.created_at || '').localeCompare(a.created_at || '')).slice(0,5).map(b => `
    <tr>
      <td><strong>${b.car_name || '—'}</strong><div style="font-size:11px;color:var(--text-muted)">${b.user_name || b.user_email || ''}</div></td>
      <td>${(b.pickup_date || '').slice(0,10)}</td>
      <td>$${Number(b.total_price || 0).toFixed(2)}</td>
      <td>${statusBadge(b.status)}</td>
    </tr>`).join('');

  render(shell(
    { title: 'Dashboard', subtitle: 'Overview & activity' },
    `
      <div class="kpi-grid">
        <div class="kpi">
          <div class="kpi-row"><div class="kpi-label">Vehicles</div><div class="kpi-icon kpi-red">🚗</div></div>
          <div class="kpi-value">${stats.total_cars}</div>
          <div class="kpi-delta">Fleet size</div>
        </div>
        <div class="kpi">
          <div class="kpi-row"><div class="kpi-label">Active rentals</div><div class="kpi-icon kpi-green">🔑</div></div>
          <div class="kpi-value">${activeRentals}</div>
          <div class="kpi-delta">Currently on the road</div>
        </div>
        <div class="kpi">
          <div class="kpi-row"><div class="kpi-label">Pending pickups</div><div class="kpi-icon kpi-amber">⏰</div></div>
          <div class="kpi-value">${pendingPickups}</div>
          <div class="kpi-delta">Awaiting confirmation</div>
        </div>
        <div class="kpi">
          <div class="kpi-row"><div class="kpi-label">Revenue this month</div><div class="kpi-icon kpi-blue">💰</div></div>
          <div class="kpi-value">$${revThisMonth.toFixed(0).replace(/\\B(?=(\\d{3})+(?!\\d))/g, ',')}</div>
          <div class="kpi-delta">${ym}</div>
        </div>
        <div class="kpi">
          <div class="kpi-row"><div class="kpi-label">Total bookings</div><div class="kpi-icon kpi-purple">📋</div></div>
          <div class="kpi-value">${stats.total_bookings}</div>
          <div class="kpi-delta">All time</div>
        </div>
        <div class="kpi">
          <div class="kpi-row"><div class="kpi-label">Registered customers</div><div class="kpi-icon kpi-blue">👥</div></div>
          <div class="kpi-value">${stats.total_users}</div>
          <div class="kpi-delta">Customer accounts (excl. admins)</div>
        </div>
        <div class="kpi">
          <div class="kpi-row"><div class="kpi-label">Customers who booked</div><div class="kpi-icon kpi-green">🛒</div></div>
          <div class="kpi-value">${stats.unique_booking_customers ?? '—'}</div>
          <div class="kpi-delta">Unique by email</div>
        </div>
      </div>

      <div class="page-title">
        <h2>Recent activity</h2>
        <button class="btn btn-gray btn-sm" onclick="navigate('bookings','showBookings')">View all bookings →</button>
      </div>
      <table>
        <thead><tr><th>Booking</th><th>Pickup</th><th>Amount</th><th>Status</th></tr></thead>
        <tbody>${recentRows || '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:24px">No bookings yet.</td></tr>'}</tbody>
      </table>
      <div id="modal-root"></div>
    `
  ));
}

// Status badge helper used by dashboard + other lists
function statusBadge(status) {
  const map = {
    pending: 'badge-gray', pending_payment: 'badge-amber',
    confirmed: 'badge-blue', active: 'badge-green',
    completed: 'badge-gray', cancelled: 'badge-red',
  };
  const cls = map[status] || 'badge-gray';
  const label = (status || '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) || '—';
  return `<span class="badge ${cls}">${label}</span>`;
}

// Alias: sidebar uses "showCars" but the legacy car management page is the dashboard.
async function showCars() {
  activePage = 'cars';
  await ensureShell();
  try {
    const [cars, locs] = await Promise.all([api('/cars/all'), api('/locations')]);
    locations = locs;
    render(shell(
      { title: 'Vehicles', subtitle: `${cars.length} car${cars.length === 1 ? '' : 's'} in your fleet` },
      `
        <div class="page-title">
          <h2>Fleet</h2>
          <button class="btn btn-red" onclick="showCarForm()">+ Add Vehicle</button>
        </div>
        <div id="car-list">${cars.map(c => carCard(c)).join('') || '<div style="text-align:center;color:var(--text-muted);padding:40px">No vehicles yet. Click "Add Vehicle" to get started.</div>'}</div>

function showAdminEditor(admin, meta) {
  meta = meta || window.__rbacMeta;
  if (!meta) { api('/admin/permissions').then(m => { window.__rbacMeta = m; showAdminEditor(admin, m); }); return; }
  const isEdit = !!admin;
  const currentPerms = new Set(admin ? (admin.permissions || []) : (meta.roles.find(r => r.key === 'manager').permissions));
  const currentRole = admin ? (admin.admin_role || 'custom') : 'manager';

  const groupOrder = ['dashboard','reports','bookings','pickups','cars','customers','locations','promo','settings','logo','notifications','admins','audit'];
  const groups = {};
  meta.permissions.forEach(p => {
    const g = p.key.split('.')[0];
    if (!groups[g]) groups[g] = [];
    groups[g].push(p);
  });
  const groupHTML = groupOrder.filter(g => groups[g]).map(g => {
    const items = groups[g].map(p => `
      <label style="display:flex;gap:8px;align-items:flex-start;padding:6px 0;cursor:pointer">
        <input type="checkbox" data-perm="${p.key}" ${currentPerms.has(p.key)?'checked':''} onchange="document.getElementById('ae-role').value='custom'"/>
        <span><strong style="font-size:13px">${p.key}</strong> <span style="color:#9aa3b2;font-size:12px">— ${p.description}</span></span>
      </label>`).join('');
    return `<div class="card" style="margin-bottom:10px"><div style="font-weight:700;text-transform:uppercase;font-size:12px;color:#7aa2ff;margin-bottom:6px">${g}</div>${items}</div>`;
  }).join('');

  const roleOptions = meta.roles.map(r => `<option value="${r.key}" ${r.key===currentRole?'selected':''}>${r.name} — ${r.description}</option>`).join('') + `<option value="custom" ${currentRole==='custom'?'selected':''}>Custom</option>`;

  openModal(`
    <h3 style="font-size:18px;font-weight:800;margin-bottom:14px">${isEdit ? 'Edit Admin: '+admin.email : 'New Admin User'}</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label style="font-size:12px;color:#9aa3b2">Email${isEdit?' (cannot change)':''}</label>
        <input id="ae-email" class="input" ${isEdit?'disabled':''} value="${isEdit?admin.email:''}" placeholder="manager@damscarrental.com"/></div>
      <div><label style="font-size:12px;color:#9aa3b2">Full name</label>
        <input id="ae-name" class="input" value="${isEdit?(admin.name||''):''}" placeholder="John Doe"/></div>
      <div><label style="font-size:12px;color:#9aa3b2">Phone (optional)</label>
        <input id="ae-phone" class="input" value="${isEdit?(admin.phone||''):''}" placeholder="+1..."/></div>
      <div><label style="font-size:12px;color:#9aa3b2">${isEdit?'New password (leave empty to keep)':'Password (min 8 chars)'}</label>
        <input id="ae-pwd" type="password" class="input" placeholder="${isEdit?'••••••••':'At least 8 characters'}"/></div>
    </div>
    <div style="margin-top:14px">
      <label style="font-size:12px;color:#9aa3b2">Role preset</label>
      <select id="ae-role" class="input" onchange="applyRolePreset()">${roleOptions}</select>
    </div>
    <div style="margin-top:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <strong style="font-size:14px">Permissions</strong>
        <div style="display:flex;gap:6px">
          <button class="btn btn-sm" type="button" onclick="aeSelectAll(true)">Select all</button>
          <button class="btn btn-sm" type="button" onclick="aeSelectAll(false)">Clear</button>
        </div>
      </div>
      <div id="ae-perms" style="max-height:340px;overflow-y:auto;border:1px solid #2a3344;border-radius:8px;padding:10px;background:#0f1623">${groupHTML}</div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-red" onclick="saveAdmin(${isEdit?`'${admin.id}'`:'null'})">${isEdit?'Save changes':'Create admin'}</button>
    </div>
  `);
}

function aeSelectAll(checked) {
  document.querySelectorAll('#ae-perms input[type=checkbox]').forEach(cb => cb.checked = checked);
  document.getElementById('ae-role').value = 'custom';
}
function applyRolePreset() {
  const role = document.getElementById('ae-role').value;
  if (role === 'custom') return;
  const meta = window.__rbacMeta;
  if (!meta) return;
  const r = meta.roles.find(x => x.key === role);
  if (!r) return;
  const set = new Set(r.permissions);
  document.querySelectorAll('#ae-perms input[type=checkbox]').forEach(cb => {
    cb.checked = set.has(cb.dataset.perm);
  });
}
async function saveAdmin(id) {
  const email = document.getElementById('ae-email').value.trim();
  const name = document.getElementById('ae-name').value.trim();
  const phone = document.getElementById('ae-phone').value.trim();
  const pwd = document.getElementById('ae-pwd').value;
  const role = document.getElementById('ae-role').value;
  const perms = Array.from(document.querySelectorAll('#ae-perms input[type=checkbox]:checked')).map(c => c.dataset.perm);
  try {
    if (id) {
      const body = { name, phone };
      if (pwd) body.new_password = pwd;
      if (role === 'custom') body.permissions = perms;
      else body.admin_role = role;
      await api(`/admin/admins/${id}`, { method:'PUT', body: JSON.stringify(body) });
    } else {
      if (!email || !pwd) { alert('Email and password are required.'); return; }
      const body = { email, name, phone, password: pwd };
      if (role === 'custom') body.permissions = perms;
      else body.admin_role = role;
      await api('/admin/admins', { method:'POST', body: JSON.stringify(body) });
    }
    closeModal();
    showAdminUsers();
  } catch(e) { alert(e.message || 'Save failed'); }
}
async function revokeAdmin(id, email) {
  if (!confirm(`Revoke admin access for ${email}? They will become a regular user (no panel access).`)) return;
  try {
    await api(`/admin/admins/${id}`, { method:'DELETE' });
    showAdminUsers();
  } catch(e) { alert(e.message || 'Revoke failed'); }
}

async function sendTestEmail() {
  const to = document.getElementById('e-test-to').value.trim();
  if (!to || !to.includes('@')) return alert('Please enter a valid email address.');
  try {
    const res = await api('/admin/email/test', { method: 'POST', body: JSON.stringify({ to }) });
    if (res.ok) alert('✅ Test email sent to ' + to + '\n\nCheck your inbox (and spam folder).');
    else alert('⚠️ Email failed: ' + (res.error || 'Unknown error'));
  } catch (e) { alert('Failed: ' + e.message); }
}

async function sendNotification() {
  const title = document.getElementById('n-title').value.trim();
  const body = document.getElementById('n-body').value.trim();
  const target = document.getElementById('n-target').value;
  if (!title || !body) return alert('Please enter both a title and a message.');
  if (!confirm(`Send this notification to "${target}"?\n\nTitle: ${title}\nMessage: ${body}`)) return;
  try {
    const res = await api('/admin/notifications/send', {
      method: 'POST',
      body: JSON.stringify({ title, body, target }),
    });
    let msg = `Sent: ${res.sent||0} / ${res.requested||0} devices accepted by Expo\n`;
    msg += `Recipients (users matched): ${res.total_recipients||0}\n`;
    if (res.invalid_tokens_removed) {
      msg += `\n⚠️ Cleaned up ${res.invalid_tokens_removed} stale token(s) (DeviceNotRegistered)`;
    }
    if (res.errors && res.errors.length) {
      msg += `\n\n⚠️ ${res.errors.length} delivery error(s):\n`;
      res.errors.slice(0,5).forEach(e => {
        msg += `  • ${e.error_code || e.status || 'unknown'}${e.message ? ': ' + e.message : ''}\n`;
      });
    }
    if ((res.sent||0) === 0) {
      msg = '⚠️ Sent to 0 devices.\n\n' + msg + '\nLikely cause: tokens are invalid (e.g., APK built without an EAS project ID, or notification permission was denied).';
      alert(msg);
    } else {
      alert('✅ Notification sent!\n\n' + msg);
    }
    document.getElementById('n-title').value = '';
    document.getElementById('n-body').value = '';
    document.getElementById('n-preview').style.display = 'none';
    // Refresh audience stats in case stale tokens were removed
    showNotifications();
  } catch (e) {
    alert('Failed to send: ' + (e.message || e));
  }
}

async function savePromo(id) {
  const expDate = document.getElementById('p-expires').value;
  const payload = {
    code: document.getElementById('p-code').value.trim().toUpperCase(),
    discount_type: document.getElementById('p-type').value,
    discount_value: parseFloat(document.getElementById('p-value').value) || 0,
    max_uses: parseInt(document.getElementById('p-maxuses').value) || 0,
    min_amount: parseFloat(document.getElementById('p-minamt').value) || 0,
    expires_at: expDate ? new Date(expDate + 'T23:59:59Z').toISOString() : null,
    active: document.getElementById('p-active').checked,
  };
  if (!payload.code || payload.code.length < 2) return alert('Please enter a valid code (at least 2 characters).');
  if (payload.discount_value <= 0) return alert('Discount value must be greater than 0.');
  if (payload.discount_type === 'percent' && payload.discount_value > 100) return alert('Percentage discount cannot exceed 100.');
  try {
    if (id) await api('/admin/promo-codes/'+id, { method:'PUT', body: JSON.stringify(payload) });
    else await api('/admin/promo-codes', { method:'POST', body: JSON.stringify(payload) });
    showPromos();
  } catch (e) { alert('Failed: ' + e.message); }
}

async function deletePromo(id, code) {

  try {

    showPromos();
  } catch (e) { alert('Failed: ' + e.message); }
}




function carCard(c) {
  // Build a Set of currently-ACTIVE location names (case-insensitive) so
  // we can filter out any ghost references this car still has from
  // BEFORE a location was deleted or deactivated. (The full cleanup
  // happens when the admin opens the Vehicle edit form → sees the
  // 🧹 banner → clicks Save. Until then we just hide the ghosts visually
  // so the card doesn't display stale data.)
  const _activeLocNames = new Set((typeof locations !== 'undefined' ? (locations || []) : []).map(l => String(l.name || '').trim().toLowerCase()));
  const _isActive = (nm) => _activeLocNames.has(String(nm || '').trim().toLowerCase());

  // Inventory badge: green when total stock > 0, red when 0 (hidden from customers).
  const stockMap = c.stock || {};
  // Only count stock at currently-active locations. Ghost keys are
  // ignored (they'll get cleaned up on the next Vehicle Save).
  const _activeStockEntries = Object.entries(stockMap).filter(([k, _v]) => _isActive(k));
  const total = _activeStockEntries.reduce((s, [, v]) => s + (parseInt(v, 10) || 0), 0);
  const hasStock = total > 0;
  const stockBreakdown = _activeStockEntries
    .filter(([, v]) => (parseInt(v, 10) || 0) > 0)
    .map(([k, v]) => k + ': ' + v)
    .join(' · ');
  const unitsBadge = !hasStock
    ? '<span style="display:inline-block;background:#ffe9e7;color:#d70015;font-weight:800;font-size:10px;padding:3px 8px;border-radius:8px;margin-left:6px;letter-spacing:0.5px">⚠️ HIDDEN · 0 UNITS</span>'
    : '<span title="' + stockBreakdown.replace(/"/g,'&quot;') + '" style="display:inline-block;background:#e6f9ed;color:#0a5d2b;font-weight:800;font-size:10px;padding:3px 8px;border-radius:8px;margin-left:6px;letter-spacing:0.5px;cursor:help">📦 '+total+' UNIT'+(total===1?'':'S')+'</span>';
  return `<div class="card" style="${hasStock?'':'opacity:0.7'}">
    <img src="${c.image_url || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22/>'}" onerror="this.style.background='#f0f0f0'">
    <div class="card-info">
      <h3>${c.name}${unitsBadge}</h3>
      <p>${c.category} · $${c.price_per_day}/day · ${c.seats} seats</p>
      ${stockBreakdown ? '<p style="color:#0a5d2b;font-size:11px;font-weight:600">📦 '+stockBreakdown+'</p>' : ''}
      ${(() => {
        const raw = (c.pickup_locations && c.pickup_locations.length) ? c.pickup_locations : (c.pickup_location ? [c.pickup_location] : []);
        // Filter out ghost names (deleted / inactive locations). The card
        // only shows references the customer would actually see.
        const pls = raw.filter(p => p && _isActive(p.name));
        if (!pls.length) return '';
        const names = pls.map(p => p.name).filter(Boolean);
        const label = names.length === 1 ? names[0] : (names[0] + ' +' + (names.length-1) + ' more');
        return '<p style="color:#007aff;font-size:11px" title="' + names.join(', ').replace(/"/g,'&quot;') + '">📍 ' + label + '</p>';
      })()}
    </div>
    <div class="card-actions">
      <button class="btn btn-sm btn-blue" onclick="showCarForm('${c.id}')">Edit</button>
      <button class="btn btn-sm btn-gray" onclick="deleteCar('${c.id}','${c.name.replace(/'/g,"\\'")}')">Delete</button>
    </div>
  </div>`;
}

async function showCarForm(id) {
  let car = {name:'',brand:'',model:'',year:2024,category:'Sedan',price_per_day:0,seats:5,transmission:'Automatic',fuel_type:'Gasoline',description:'',image_url:'',pickup_location:{name:'',lat:0,lng:0},dropoff_location:{name:'',lat:0,lng:0}};
  if (id) { try { car = await api('/cars/'+id); } catch(e){} }
  const cats = ['Sedan','SUV','Luxury','Electric','Sports','Compact'];

  // --- Prune deleted / inactive locations from the car's saved data ---
  // The car may reference locations that have since been deleted or
  // deactivated. Filter them out so the form starts in a clean state:
  // the stock-input rows, hidden form inputs, and saved payload all
  // only carry references to currently-ACTIVE locations. (The global
  // `locations` array is already filtered to active-only via
  // GET /api/locations.) Detected stale entries are reported via a
  // small banner so the admin knows to click Save to commit the cleanup.
  const _activeLocSet = new Set((locations || []).map(l => String(l.name || '').trim().toLowerCase()));
  const _pruneLocs = (arr) => {
    if (!Array.isArray(arr)) return { kept: [], removed: [] };
    const kept = [], removed = [];
    for (const x of arr) {
      const nm = String((x && x.name) || '').trim();
      if (!nm) continue;
      if (_activeLocSet.has(nm.toLowerCase())) kept.push(x);
      else removed.push(nm);
    }
    return { kept, removed };
  };
  const _origPickups = (car.pickup_locations && car.pickup_locations.length)
    ? car.pickup_locations
    : (car.pickup_location && car.pickup_location.name ? [car.pickup_location] : []);
  const _origDropoffs = (car.dropoff_locations && car.dropoff_locations.length)
    ? car.dropoff_locations
    : (car.dropoff_location && car.dropoff_location.name ? [car.dropoff_location] : []);
  const _prunedPickups = _pruneLocs(_origPickups);
  const _prunedDropoffs = _pruneLocs(_origDropoffs);
  // Also prune the stock dict so deleted-location stock entries disappear.
  const _stockClean = {};
  const _stockRemoved = [];
  Object.entries(car.stock || {}).forEach(([k, v]) => {
    const lower = String(k || '').trim().toLowerCase();
    if (_activeLocSet.has(lower)) _stockClean[k] = v;
    else if (k) _stockRemoved.push(k);
  });
  const _staleNames = Array.from(new Set([
    ..._prunedPickups.removed,
    ..._prunedDropoffs.removed,
    ..._stockRemoved,
  ]));
  const _staleBanner = _staleNames.length ? `
        <div style="background:#fff7ed;border:1px solid #fdba74;border-radius:10px;padding:10px 12px;margin:10px 0;font-size:12px;color:#9a3412;font-weight:600;line-height:1.5">
          🧹 <strong>Cleaned up ${_staleNames.length} deleted/inactive location reference${_staleNames.length>1?'s':''}</strong> on this vehicle: ${_staleNames.map(n => '<code style="background:#fed7aa;padding:1px 6px;border-radius:6px;color:#7c2d12">' + String(n).replace(/</g,'&lt;') + '</code>').join(' ')}. Click <strong>Save</strong> to commit, or pick replacement location${_staleNames.length>1?'s':''} below first.
        </div>` : '';
  // The car object below uses the PRUNED arrays/stock everywhere.
  car.pickup_locations = _prunedPickups.kept;
  car.dropoff_locations = _prunedDropoffs.kept;
  car.stock = _stockClean;
  // Also prune the DEPRECATED SINGULAR mirrors (pickup_location /
  // dropoff_location). The form-render template still falls back to
  // these when the plural arrays are empty — so if they hold a stale
  // (now-deleted/inactive) name, that ghost would leak through into
  // the pills + stock-input section. Track the stale singular names
  // so they show up in the banner too.
  const _singularPruned = [];
  if (car.pickup_location && car.pickup_location.name) {
    const sname = String(car.pickup_location.name).trim();
    if (sname && !_activeLocSet.has(sname.toLowerCase())) {
      _singularPruned.push(sname);
      car.pickup_location = null;
    }
  }
  if (car.dropoff_location && car.dropoff_location.name) {
    const sname = String(car.dropoff_location.name).trim();
    if (sname && !_activeLocSet.has(sname.toLowerCase())) {
      _singularPruned.push(sname);
      car.dropoff_location = null;
    }
  }
  // Merge any newly-discovered stale singular names into the banner.
  if (_singularPruned.length) {

// Multi-select location toggle: adds/removes the location from the hidden
// `f-pickups`/`f-dropoffs` JSON arrays. Updates the pill's active style and
// the running count label.
function toggleLoc(type, name, lat, lng) {
  const inputId = 'f-' + (type==='pickup' ? 'pickups' : 'dropoffs');
  const input = document.getElementById(inputId);
  let arr = [];
  try { arr = JSON.parse(input.value || '[]'); } catch(e) { arr = []; }
  const idx = arr.findIndex(x => x && x.name === name);
  const activeClass = type==='pickup' ? 'active-green' : 'active-red';
  if (idx >= 0) {
    arr.splice(idx, 1);
    if (event && event.target && event.target.classList) event.target.classList.remove(activeClass);
  } else {
    // Look up the full location metadata so the entry we save carries
    // the COUNTRY (and city) — not just {name, lat, lng}. Without country
    // the mobile/web booking page can't render the correct ITBIS vs Tax
    // label, even though the tax_rate itself comes back fine from the
    // /api/locations/tax-by-name endpoint. Missing country here is the
    // exact regression that resurfaced after the location cleanup.
    const meta = (typeof locations !== 'undefined' ? (locations || []) : [])
      .find(l => String(l.name || '').trim().toLowerCase() === String(name || '').trim().toLowerCase());
    const entry = {
      name,
      lat,
      lng,
      country: (meta && meta.country) ? meta.country : '',
      city:    (meta && meta.city)    ? meta.city    : '',
    };
    arr.push(entry);
    if (event && event.target && event.target.classList) event.target.classList.add(activeClass);
  }
  input.value = JSON.stringify(arr);
  const counter = document.getElementById(type+'-count');
  if (counter) counter.textContent = arr.length ? '(' + arr.length + ' selected)' : '';
  // Pickup OR dropoff changes affect the stock inputs (union list).
  renderStockInputs();
}

// Build a numeric input per UNIQUE location the car is associated with
// (pickup OR drop-off OR both) so the admin can set the initial inventory
// per physical location. A drop-off location may receive stock when a car
// is returned there, so it needs a configurable starting value too.
function renderStockInputs() {
  const container = document.getElementById('stock-inputs');
  if (!container) return;
  // First, capture any current edits so we don't lose them when re-rendering.
  const current = {};
  container.querySelectorAll('input[data-stock-key]').forEach(inp => {
    current[inp.getAttribute('data-stock-key')] = parseInt(inp.value, 10) || 0;
  });
  // Stored stock from the hidden input (or initial value).
  let stored = {};
  try { stored = JSON.parse(document.getElementById('f-stock').value || '{}'); } catch(e) { stored = {}; }
  // Build union of pickup + dropoff location names (preserving order: pickups first, dropoff-only after).
  let pickups = [];
  let dropoffs = [];
  try { pickups = JSON.parse(document.getElementById('f-pickups').value || '[]'); } catch(e) { pickups = []; }
  try { dropoffs = JSON.parse(document.getElementById('f-dropoffs').value || '[]'); } catch(e) { dropoffs = []; }
  const pickupNames = new Set(pickups.map(p => p.name));
  const dropoffNames = new Set(dropoffs.map(d => d.name));
  const allNames = [];
  pickups.forEach(p => allNames.push(p.name));
  dropoffs.forEach(d => { if (!pickupNames.has(d.name)) allNames.push(d.name); });
  if (!allNames.length) {
    container.innerHTML = '<div style="padding:12px;background:#fafafa;border-radius:10px;color:#999;font-size:13px;text-align:center">Select one or more Pickup or Drop-off locations above to set their initial stock.</div>';
    return;
  }
  container.innerHTML = allNames.map(name => {
    const val = name in current ? current[name] : (stored[name] ?? 0);
    const isPickup = pickupNames.has(name);
    const isDropoff = dropoffNames.has(name);
    const roleBadge = isPickup && isDropoff
      ? '<span style="background:#e6f9ed;color:#0a5d2b;padding:2px 6px;border-radius:6px;font-size:9px;font-weight:800;letter-spacing:0.5px">🔄 PICKUP &amp; DROP-OFF</span>'
      : isPickup
        ? '<span style="background:#e6f9ed;color:#0a5d2b;padding:2px 6px;border-radius:6px;font-size:9px;font-weight:800;letter-spacing:0.5px">📥 PICKUP</span>'
        : '<span style="background:#FFE9E7;color:#d70015;padding:2px 6px;border-radius:6px;font-size:9px;font-weight:800;letter-spacing:0.5px">📤 DROP-OFF</span>';
    const dotColor = isPickup ? '#34C759' : '#FF3B30';
    const safeName = (name||'').replace(/"/g,'&quot;');
    return '<label style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fafafa;border-radius:10px;border:1px solid #e5e5e5">'
      + '<div style="width:8px;height:8px;border-radius:4px;background:'+dotColor+'"></div>'
      + '<div style="flex:1;min-width:0">'
        + '<div style="font-weight:700;font-size:14px;color:#0a0a0a">' + (name||'').replace(/</g,'&lt;') + '</div>'
        + '<div style="margin-top:3px">' + roleBadge + '</div>'
      + '</div>'
      + '<input type="number" min="0" step="1" data-stock-key="' + safeName + '" value="' + val + '" style="width:90px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;text-align:right;font-weight:700;font-size:14px" />'
      + '</label>';
  }).join('');
}

async function saveCar(id) {
  const unlim = document.getElementById('f-unlimited').checked;
  const mileageVal = parseInt(document.getElementById('f-mileage').value);
  // Build stock map from the per-location number inputs.
  const stock = {};
  document.querySelectorAll('#stock-inputs input[data-stock-key]').forEach(inp => {
    stock[inp.getAttribute('data-stock-key')] = Math.max(0, parseInt(inp.value, 10) || 0);
  });
  const body = {
    name: document.getElementById('f-name').value,
    brand: document.getElementById('f-brand').value,
    model: document.getElementById('f-model').value,
    year: parseInt(document.getElementById('f-year').value)||2024,
    category: document.getElementById('f-cat').value,
    price_per_day: parseFloat(document.getElementById('f-price').value)||0,
    seats: parseInt(document.getElementById('f-seats').value)||5,
    bags: parseInt(document.getElementById('f-bags').value) || 0,
    transmission: document.getElementById('f-trans').value,
    fuel_type: document.getElementById('f-fuel').value,
    stock: stock,
    description: document.getElementById('f-desc').value,
    image_url: document.getElementById('f-img').value,
    images: (() => { try { return JSON.parse(document.getElementById('f-images').value || '[]'); } catch(e) { return []; } })(),
    unlimited_mileage: unlim,
    mileage_limit: unlim ? null : (isNaN(mileageVal) ? null : mileageVal),
    deposit: parseFloat(document.getElementById('f-deposit').value) || 0,
    min_driver_age: parseInt(document.getElementById('f-minage').value) || 21,
    android_auto: document.getElementById('f-android').checked,
    apple_carplay: document.getElementById('f-carplay').checked,
    blind_spot_warning: document.getElementById('f-bsw').checked,
    gps: document.getElementById('f-gps').checked,
    keyless_entry: document.getElementById('f-keyless').checked,
    sunroof: document.getElementById('f-sunroof').checked,
  };
  try { body.pickup_locations = JSON.parse(document.getElementById('f-pickups').value || '[]'); } catch(e) { body.pickup_locations = []; }
  try { body.dropoff_locations = JSON.parse(document.getElementById('f-dropoffs').value || '[]'); } catch(e) { body.dropoff_locations = []; }
  // Defensive prune at save-time: ensure no stale/deleted/inactive location
  // names sneak back into the DB even if `locations` was refreshed while
  // this form was open. Same filter as the form-open prune.
  {
    const _activeAtSave = new Set((locations || []).map(l => String(l.name || '').trim().toLowerCase()));
    body.pickup_locations = (body.pickup_locations || []).filter(
      x => x && x.name && _activeAtSave.has(String(x.name).trim().toLowerCase())
    );
    body.dropoff_locations = (body.dropoff_locations || []).filter(
      x => x && x.name && _activeAtSave.has(String(x.name).trim().toLowerCase())
    );
    // Also strip stock keys that don't match any active location.
    const cleanStock = {};
    Object.entries(body.stock || {}).forEach(([k, v]) => {
      if (k && _activeAtSave.has(String(k).trim().toLowerCase())) cleanStock[k] = v;
    });
    body.stock = cleanStock;
  }
  if (!body.name||!body.brand||!body.price_per_day) { alert('Name, brand and price required'); return; }
  if (!body.pickup_locations.length) { alert('❌ Please select at least one Pickup Location before saving the vehicle.'); return; }
  if (!body.dropoff_locations.length) { alert('❌ Please select at least one Drop-off Location before saving the vehicle.'); return; }
  try {
    await api(id?'/cars/'+id:'/cars', {method:id?'PUT':'POST', body:JSON.stringify(body)});
    closeModal(); showDashboard();
  } catch(e) { alert(e.message); }
}

async function deleteCar(id,name) {
  if (!confirm('Delete '+name+'?')) return;
  try { await api('/cars/'+id,{method:'DELETE'}); showDashboard(); } catch(e) { alert(e.message); }
}

      <div style="background:#1a2030;color:#e9ecf3;border:1px solid #2a3344;border-radius:14px;padding:22px;max-width:760px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.5);margin-top:24px">

function getAllImages() {
  const primary = document.getElementById('f-img').value;
  let extras = [];
  try { extras = JSON.parse(document.getElementById('f-images').value || '[]'); } catch(e) {}
  return primary ? [primary, ...extras] : extras;
}

function setAllImages(imgs) {
  document.getElementById('f-img').value = imgs[0] || '';
  document.getElementById('f-images').value = JSON.stringify(imgs.slice(1));
  renderGallery();
}

function renderGallery() {
  const wrap = document.getElementById('gallery-wrap');
  if (!wrap) return;
  const imgs = getAllImages();
  if (imgs.length === 0) {
    wrap.innerHTML = '<div style="grid-column:1/-1;padding:20px;text-align:center;color:#999;background:#fafafa;border-radius:14px;border:2px dashed #e5e5e5;font-size:13px">No photos yet — click "Add Photo" below</div>';
    return;
  }
  wrap.innerHTML = imgs.map((src, i) => `
    <div style="position:relative;border-radius:12px;overflow:hidden;background:#f5f5f5;aspect-ratio:4/3">
      <img src="${src}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.background='#eee'">
      ${i === 0 ? '<span style="position:absolute;top:4px;left:4px;background:#ff3b30;color:#fff;font-size:10px;font-weight:800;padding:2px 6px;border-radius:50px">MAIN</span>' : ''}
      ${i !== 0 ? `<span onclick="makeMainImage(${i})" style="position:absolute;top:4px;left:4px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:50px;cursor:pointer">Make Main</span>` : ''}
      <span onclick="removeImage(${i})" style="position:absolute;top:4px;right:4px;background:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#ff3b30;font-weight:bold;box-shadow:0 1px 4px rgba(0,0,0,.2)">✕</span>
    </div>
  `).join('');
}

function removeImage(idx) {
  const imgs = getAllImages();
  imgs.splice(idx, 1);
  setAllImages(imgs);
}

function makeMainImage(idx) {
  const imgs = getAllImages();
  const [chosen] = imgs.splice(idx, 1);
  imgs.unshift(chosen);
  setAllImages(imgs);
}

async function uploadImages(input) {
  const files = Array.from(input.files || []);
  if (files.length === 0) return;
  const status = document.getElementById('upload-status');
  const imgs = getAllImages();
  let done = 0, failed = 0;
  for (const file of files) {
    status.innerHTML = `<span style="color:#007aff;font-size:13px">⏳ Uploading ${done+1} of ${files.length}...</span>`;
    try {
      const compressed = await compressImage(file, 1200, 0.85);
      const base64 = compressed.dataUrl.split(',')[1];
      const res = await api('/upload/image', {
        method: 'POST',
        body: JSON.stringify({ image_data: base64, filename: 'car_' + Date.now() + '_' + done + '.jpg' })
      });
      imgs.push(res.url);
      done++;
    } catch(e) { failed++; }
  }
  setAllImages(imgs);
  status.innerHTML = `<span style="color:#34c759;font-size:13px">✅ ${done} photo(s) uploaded${failed?`, ${failed} failed`:''}</span>`;
  input.value = '';
}

// Canvas-based image compression – resizes large photos and converts to JPEG
function compressImage(file, maxSize, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxSize || h > maxSize) {
          if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
          else { w = Math.round(w * maxSize / h); h = maxSize; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        // Approximate byte size of the base64 string
        const size = Math.round((dataUrl.length - 22) * 3 / 4);
        resolve({ dataUrl, size });
      };
      img.onerror = () => reject(new Error('Could not read image'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('Could not read file'));
    reader.readAsDataURL(file);
  });
}

async function showOperations() {
  // Fetch all bookings; partition client-side into "awaiting pickup" and "awaiting drop-off".
  let bookings = [];
  try {
    bookings = await api('/admin/bookings');
  } catch (e) { alert(e.message); return; }
  const pendingPickup = bookings.filter(b => ['pending','pending_payment','confirmed'].includes(b.status));
  const awaitingDropoff = bookings.filter(b => b.status === 'active');
  pendingPickup.sort((a,b) => (a.pickup_date||'').localeCompare(b.pickup_date||''));
  awaitingDropoff.sort((a,b) => (a.dropoff_date||'').localeCompare(b.dropoff_date||''));

  function rowHtml(b, action) {
    const locName = action === 'pickup'
      ? ((b.pickup_location && b.pickup_location.name) || '—')

      : '<span style="display:inline-block;background:#fff5e6;color:#a05a00;font-weight:700;font-size:10px;padding:3px 8px;border-radius:6px;letter-spacing:0.5px">'+((b.payment_status||'unpaid')||'').toUpperCase()+'</span>';
    const btnLabel = action === 'pickup' ? '✓ Confirm Pickup' : '✓ Confirm Drop-off';
    const btnColor = action === 'pickup' ? '#34c759' : '#0a84ff';
    const newStatus = action === 'pickup' ? 'active' : 'completed';
    return `<div style="background:#fff;border:1px solid #eee;border-radius:14px;padding:14px 16px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start">
        <div style="flex:1;min-width:0">

          <div style="margin-top:4px;color:#333;font-size:12px">📍 ${locName} · 📅 ${dateStr} · 💰 $${(b.total_price||0).toFixed?b.total_price.toFixed(2):b.total_price}</div>

  }

  render(`
    <div class="header">
      <div style="display:flex;align-items:center;gap:14px">
        <img class="brand-logo" src="/api/assets/logo.png" alt="DAMS Rent a Car"/>
        <span class="admin-id-pill"><span class="dot"></span>Pickups</span>
      </div>
      <div style="display:flex;gap:8px">
        <button class="nav-btn ghost" onclick="showDashboard()">← Back to Cars</button>
        <button class="nav-btn ghost" onclick="showBookings()">Bookings</button>

async function bulkCancelPendingPickups() {
  const phrase = 'CANCEL';
  const typed = prompt(
    '⚠️ Bulk cancel ALL pending pickup bookings?\n\n' +
    'This will mark every booking with status "pending", "pending_payment" or "confirmed" as CANCELLED. ' +
    'This is intended to clear stale/test data and CANNOT be undone in bulk.\n\n' +
    'Type ' + phrase + ' (in capitals) to confirm:'
  );
  if (typed !== phrase) {
    if (typed !== null) alert('Confirmation phrase did not match. No bookings were cancelled.');
    return;
  }
  try {
    const res = await api('/admin/bookings/cancel-pending-pickups', { method: 'POST', body: JSON.stringify({}) });
    alert('✅ ' + (res.cancelled_count || 0) + ' booking(s) cancelled.');
    showOperations();
  } catch (e) {
    alert('❌ ' + (e.message || 'Failed to bulk cancel.'));
  }
}

  // Look up the pickup location's mileage policy so we can show the live

    </div>
    <div class="form-group">
      <label style="font-weight:800">🚗 Odometer reading at Pickup (km)</label>

      <div style="font-size:11px;color:#888;margin-top:4px;font-weight:600">Optional. Used later to compute extra mileage on drop-off.</div>

      <label style="font-weight:800">🚗 Odometer at Pickup (km)</label>
      <input class="input" id="po-odom-in" type="number" min="0" value="${odomInPrev}" placeholder="—" ${odomInPrev !== '' ? 'readonly' : ''} />
      ${odomInPrev !== '' ? '<div style="font-size:11px;color:#888;margin-top:4px;font-weight:600">Recorded at pickup. Cannot be edited.</div>' : '<div style="font-size:11px;color:#a05a00;margin-top:4px;font-weight:600">⚠️ No reading was captured at pickup. Enter it now to compute extra mileage.</div>'}
    </div>
    <div class="form-group">
      <label style="font-weight:800">🏁 Odometer at Drop-off (km) <span style="color:#666;font-weight:500">(optional)</span></label>
      <input class="input" id="po-odom-out" type="number" min="0" placeholder="e.g. 45980" oninput="window._poUpdateMileage && window._poUpdateMileage()" />
    </div>
    <div id="po-mileage-preview" style="background:#f5f5f7;border-radius:10px;padding:12px;font-size:12px;color:#333;font-weight:600;margin-bottom:8px">
      ${mileagePolicy.unlimited_mileage
        ? '✅ <strong>Unlimited mileage</strong> on this location — no extra mileage fee will be charged.'
        : `📏 Mileage policy: <strong>${mileagePolicy.mileage_limit_per_day} km/day</strong> × ${days} day(s) = <strong>${allowedKm} km allowed</strong>. Overage charged at <strong>$${mileagePolicy.extra_mileage_charge.toFixed(2)}/km</strong>.`}
    </div>
    ${mileagePolicy.unlimited_mileage ? '' : `
    <div id="po-mileage-breakdown" style="display:none;background:#fff5e6;border:2px solid #ffd48a;border-radius:12px;padding:14px;margin-bottom:8px">
      <div style="font-size:11px;font-weight:800;color:#a05a00;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">📊 Extra Mileage Calculation</div>
      <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;color:#333;font-weight:600">
        <span>Odometer at Drop-off</span><span id="po-br-out">— km</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;color:#333;font-weight:600">
        <span>− Odometer at Pickup</span><span id="po-br-in">— km</span>
